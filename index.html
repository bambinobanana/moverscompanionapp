const ACTIVITIES={
en:[
  {id:9,name:"Power 8",type:"Energizer",minPeople:15,maxPeople:200,duration:4,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"A countdown shake-out to release tension and reset the room's energy. Fast, universal, works for any size.",instructions:["Stand up (or stay seated if needed).","Shake your right hand counting down from 8: 8-7-6-5-4-3-2-1!","Repeat with left hand, right foot, left foot — 8 counts each.","Repeat the whole sequence from 4, then 2, then 1.","End with a big jump, clap, or cheer!"],facilTip:"Works brilliantly online — everyone does it at their desk. Zero awkwardness, instant energy.",facilScript:"Stand up — or stay seated if you need to. We are going to shake out the energy. Right hand, shake it 8 times: 8, 7, 6, 5, 4, 3, 2, 1! Left hand! Right foot! Left foot! Now from 4... from 2... from 1! [Big finish!]",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:17,name:"Giant Rock-Paper-Scissors",type:"Energizer",minPeople:15,maxPeople:200,duration:10,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"A whole-room Rock-Paper-Scissors tournament where losers become passionate cheerleaders — building into an epic, crowd-fueled final.",instructions:["Everyone raises their right hand to signal availability. Find someone with their hand up and play Rock-Paper-Scissors.","The loser becomes the winner's personal cheerleader — following them, chanting their name.","Winners keep their hand up and find new opponents. Cheer squads grow bigger every round.","When only 2 finalists remain, pause. Interview them, build the hype.","Count down to the grand final: best of 3 or best of 5!"],facilTip:"Your energy sets the ceiling. Go all-in during the final — sports commentator vibe. The bigger the drama, the more memorable.",facilScript:"Everyone raise your right hand — you are in. Find someone with their hand up and play. Winner stays in, hand stays up. Loser? You are now their BIGGEST FAN. Follow them. Scream their name. Last two face off in the grand final. Ready? GO!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:18,name:"Human Knot",type:"Energizer",minPeople:6,maxPeople:200,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Everyone grabs random hands across a tight circle, creating a human knot the group must untangle without ever letting go.",instructions:["Stand in a circle, then step inward until shoulders are almost touching.","Everyone raises their right hand and grabs someone's hand across the circle — not a neighbor's.","Everyone raises their left hand and grabs a different person's hand — not a neighbor's.","Without releasing, untangle back into a circle by stepping over, under, and through each other.","Emergency break allowed: one pair may release and reconnect once. Two interlocked circles also count!","For 20+ people: split into circles and race — first to untangle wins!"],facilTip:"Rich debrief on team dynamics. Works best when people resist over-directing and experiment instead. Competition format adds great energy for larger groups.",facilScript:"Everyone in a circle — step in until it is tight. Right hand up, grab someone across — not your neighbor! Left hand up, grab a different person. Without letting go, untangle yourselves. Step over, duck under, twist around. Go!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:19,name:"Walk Around the Room",type:"Energizer",minPeople:8,maxPeople:100,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"A deceptively simple movement game — the facilitator calls numbers with actions, then sneaks in a trick that triggers real laughter.",instructions:["Everyone walks freely around the room. The facilitator calls numbered actions.","1 = high five the nearest person. Practice a few times.","2 = everyone jumps. But right after announcing 2, call 1 again — some people will jump on instinct!","Build: 3 = sit down fast, 4 = form a group of exactly 4, and so on.","Invent new numbers on the fly. Keep the pace quick and surprises coming."],facilTip:"The trick only works with a completely straight face. The moment of confusion when people realize they were tricked is the whole payoff.",facilScript:"Walk around the room — fill every corner. 1 = high five the nearest person. Let's try: ONE! [repeat]. Now 2 = everyone jumps. Ready? ONE! [pause] ONE! [watch the chaos]. TWO! Ha! Let's keep going...",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:10,name:"Zip Zap Zop",type:"Energizer",minPeople:8,maxPeople:40,duration:5,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"A fast-paced attention game where energy passes around the circle with words and eye contact.",instructions:["Stand in a circle. One person points to someone and says Zip!","That person points to another and says Zap!","That person points to someone and says Zop!","Continue cycling: Zip, Zap, Zop... Speed up gradually.","Anyone who hesitates or says the wrong word is out — or does a forfeit!"],facilTip:"Demonstrate with exaggerated enthusiasm. Perfect right after lunch to re-energize the room.",facilScript:"Stand in a circle. Three words: Zip, Zap, Zop — in that order, always. Point and say ZIP. They point and say ZAP. That person says ZOP. Then restart. Speed increases. Anyone who hesitates is out. Let's go!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:11,name:"Soundball",type:"Energizer",minPeople:6,maxPeople:30,duration:7,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"An imaginary ball is thrown around with a sound effect. Add more balls to increase the chaos!",instructions:["Stand or sit in a circle. One person throws an invisible ball with a sound (WHOOSH!).","The receiver catches it with a sound and throws to someone else.","After 1 min, add a 2nd ball: super heavy, hot potato, bouncy...","Challenge: keep all balls going simultaneously!"],facilTip:"Works online too — throw with a camera gesture and sound. Great focus-builder for virtual sessions.",facilScript:"We have an invisible ball. Make eye contact, point, and make a sound — any sound. The louder and weirder the better. The catcher makes a catch sound then throws to someone else. I am adding a second ball — SUPER heavy. Ready?",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:12,name:"Mirror",type:"Energizer",minPeople:6,maxPeople:40,duration:7,objective:["energy","get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:true,space:["seated","limited","open","online"],description:"Pairs mirror each other's slow movements — with no designated leader in the final round.",instructions:["Pair up. Face each other or use cameras online.","One person leads slow movements; the other mirrors exactly.","After 90 seconds, swap roles.","Round 3: no designated leader — try to move as one.","Debrief: what did it feel like to lead, follow, or share leadership?"],facilTip:"The third round with no leader is the magic. Soft background music enhances the effect.",facilScript:"Find a partner, face each other. One leads — move slowly, like slow motion. The other mirrors exactly. After 90 seconds I say switch. Then the last round: no leader. Move as one. Let's begin.",materials:"None (calm music optional)",outcome:"Participants will feel re-energized and more connected to the people around them."},
  {id:14,name:"Ninja",type:"Energizer",minPeople:6,maxPeople:25,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"A dramatic elimination game of frozen poses and single strikes — high energy, huge laughs.",instructions:["Stand in a circle. On 3-2-1-NINJA! everyone jumps into a frozen ninja pose.","Clockwise, each player makes ONE strike motion toward a neighbor's hand.","The target can dodge with ONE move. If hit, that hand goes behind their back.","Two hands lost = eliminated. Last ninja standing wins!"],facilTip:"Model it with maximum seriousness for maximum laughs. The dramatic posing sets the whole vibe.",facilScript:"Everyone in a circle. On 3-2-1, jump into your most powerful ninja pose and freeze. Each person makes ONE strike at a neighbor's hand. They can dodge with ONE move. Two hands lost = eliminated. 3... 2... 1... NINJA!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:20,name:"Ho Ha He (Butcher)",type:"Energizer",minPeople:8,maxPeople:40,duration:8,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"A circle game of sharp mimes and synchronized sounds — HO, HA, HE — getting faster, louder, and more chaotic each round.",instructions:["Stand in a circle. One person yells HO! miming a chopping motion top to bottom toward someone across.","That person yells HA! lifting both hands upward.","Their two neighbors yell HE! and mime slicing inward from each side.","The targeted person becomes the new sender. Speed up each round.","Optional: anyone who hesitates or makes a mistake is out. Last three win."],facilTip:"Teach slowly first — HO-HA-HE must click before you accelerate. Once it does, energy builds itself.",facilScript:"Watch: HO! [chop downward]. That person: HA! [hands up]. Their neighbors: HE! [slice inward]. Then it starts again. Slow first... good! Now faster. Louder. GO!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:16,name:"Everybody Up",type:"Energizer",minPeople:4,maxPeople:30,duration:5,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Pairs try to stand up together from seated back-to-back — then scale to bigger groups.",instructions:["Find a partner. Sit back-to-back, knees bent, arms linked.","Try to stand up together WITHOUT using your hands.","Once up, join another pair (group of 4) and try again.","Keep adding people until the whole group attempts it together.","Debrief: what changed as the group got larger?"],facilTip:"Beautiful metaphor for interdependence. Check for mobility limitations beforehand.",facilScript:"Back-to-back on the floor, link arms, knees bent. Stand up together — without hands. Once up, grab another pair and try as 4. Keep growing. Let's see how far we get!",materials:"None (clear floor space needed)",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:21,name:"Circle of Introductions",type:"Icebreaker",minPeople:3,maxPeople:20,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"The classic round of introductions — elevated with a thoughtful prompt. Works in any setting, even when no one can move.",instructions:["Ask everyone to introduce themselves: name, where they are from, what they do.","Add one or two targeted prompts — something personal, forward-looking, or reflective.","Go around. For 15+ people, give a strict time limit (e.g. 60 seconds each).","After everyone has shared, invite the group to notice patterns or surprises."],facilTip:"The prompt is everything. What is one thing people would not guess from your job title? yields far richer sharing than tell us about your role.",facilScript:"Let's meet each other. Share your name, where you are from — and [your prompt]. About a minute each. I'll go first: my name is...",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:2,name:"Human Bingo",type:"Icebreaker",minPeople:10,maxPeople:50,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["limited","open"],description:"Participants mingle to find people matching descriptions on their bingo card — a high-energy way to discover what makes each person unique.",instructions:["Hand out bingo cards with traits like speaks 3 languages or has lived in 3 countries.","Set a timer. Participants mingle and ask questions to fill their card.","First to complete a line (or full card) shouts BINGO!","Debrief: share the most surprising thing you discovered."],facilTip:"Customize traits to your group context — SDG-related traits work great for development workers.",facilScript:"You each have a bingo card. Find someone who matches each description and write their name. One person per box! First to complete a line shouts BINGO. You have 10 minutes — go!",materials:"Printed bingo cards, pens",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:3,name:"4 Corners",type:"Icebreaker",minPeople:10,maxPeople:100,duration:10,objective:["get-to-know","energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["open"],description:"Participants move to room corners based on preferences — surfaces similarities and differences in a playful, physical way.",instructions:["Label 4 corners (e.g. Early Bird / Night Owl / Depends / Both).","Ask a question and everyone walks to their corner.","People briefly chat with others in their corner (1 min).","Repeat 4-6 times, mixing fun and work-relevant questions."],facilTip:"Mix playful questions (tea vs coffee) with meaningful ones (solo vs collaborative work).",facilScript:"Four corners, each with an option. Walk to the corner that best represents you. No right or wrong answers — 1 minute to chat with your corner. Ready? First question...",materials:"4 corner labels (printed or flipchart paper)",outcome:"Participants will feel more comfortable, learn about each other, and arrive energized for the session ahead."},
  {id:22,name:"Life Line",type:"Icebreaker",minPeople:4,maxPeople:30,duration:20,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"In pairs or trios, participants share the story of their life — from birth to today. One of the most powerful connection exercises there is.",instructions:["Pair up or form groups of 3. Each person shares their life journey — key moments, turning points, highs and lows.","Optional: both sharer and listener draw the life line on paper simultaneously.","Give each person 5-8 minutes. The listener mostly listens, can ask 1-2 questions at the end.","If time allows, invite volunteers to share one thing they discovered about their partner."],facilTip:"Vulnerability is contagious. Model genuine openness in your instructions — even sharing a fragment of your own story — and the room will follow.",facilScript:"In pairs, share your life — from birth to now. Not everything, just what feels important. About 7 minutes each. Your partner listens fully. You can draw it on paper. I'll keep time. Find your partner.",materials:"Paper and pens (optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:5,name:"Desert Island",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Stranded on a desert island for a month — what 3 items do you bring? A timeless classic that reveals personality.",instructions:["Stranded on a deserted island for one month — 3 items only. What do you choose?","Give 2 minutes for individual thinking.","Go around — each person shares their 3 items and why.","Debrief: notice patterns — practical vs creative vs emotional choices."],facilTip:"Add a twist: one item must be useful for the group, one personal, one surprising.",facilScript:"Stranded on a deserted island for one month. Exactly 3 items — anything you want. 2 minutes to decide. Then we share. I am curious what you will choose...",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:4,name:"My Superpower",type:"Icebreaker",minPeople:5,maxPeople:25,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Each person identifies one unique strength — framed as their team superpower. A confidence-building opener that surfaces collective talent.",instructions:["Prompt: If you had to name one unique superpower you bring to a team, what would it be?","Give 1 minute to think (can jot it down).","Go around — each person shares in one sentence.","Optional: the group votes for the most powerful team combo."],facilTip:"Frame it lightly — some people feel shy about self-promotion. Humor is very welcome!",facilScript:"If you had a superpower — one unique strength you bring to a team — what would it be? 1 minute to think. Serious or funny. We go around and share in one sentence.",materials:"None (sticky notes optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:23,name:"Item Share",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Each person brings one meaningful object and shares the story behind it. Simple, personal, and surprisingly moving.",instructions:["Before the session, ask participants to bring one meaningful object — personal, symbolic, or professional.","Go around — each person shows their item and explains what it is and why (30-60 seconds).","Invite one or two reactions or questions from the group.","Optional debrief: what patterns or themes emerged?"],facilTip:"Send the prompt at least 24 hours before. Share your own object first to set the tone.",facilScript:"I asked you to bring one object that means something to you. Let's go around. Hold it up, tell us what it is and why you brought it. About 45 seconds each. Who wants to go first?",materials:"Participants bring their own item (pre-workshop prompt required)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:24,name:"Word Association",type:"Icebreaker",minPeople:2,maxPeople:5,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Everyone says one word a person makes them think of — then that person responds with stories connected to each word. Intimate, revealing, often surprising.",instructions:["Focus on one person. Everyone else says one word this person makes them think of — instinctive, no filtering.","The person takes each word and shares a story, memory, or reflection connected to it.","Rotate until everyone has had their turn.","Optional extended version (30 min): more words and deeper storytelling per person."],facilTip:"The words reveal as much about the speakers as about the person in the hot seat. Point this out in the debrief.",facilScript:"One person is in the hot seat — everyone gives them one word. The first word that comes to mind. Then the person responds to each word with a story. I'll go first in the hot seat. What word comes to mind when you think of me?",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:25,name:"Powerful Questions",type:"Icebreaker",minPeople:6,maxPeople:100,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["limited","open"],description:"Each person crafts one powerful question, then mingles to ask and answer with different partners — sparking genuine one-on-one conversations.",instructions:["Explain what makes a question powerful: open-ended, thought-provoking. Give a good and bad example.","Give 2 minutes to write their question (sticky note optional).","Everyone raises their hand. Find a partner, ask each other your questions, and really listen.","When done, hand up and find a new partner. Repeat 3-5 rounds.","Debrief: what was the most powerful question you heard?"],facilTip:"Bad: What do you do? Good: What is a belief you hold that most people in your field would disagree with? The contrast helps people aim higher.",facilScript:"Write one powerful question — something real, not where are you from. Two minutes. Raise your hand. Find someone else with their hand up. Ask, listen. When done, hand up again. Go!",materials:"Sticky notes and pens (optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:26,name:"Silent Lines",type:"Icebreaker",minPeople:8,maxPeople:200,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["limited","open"],description:"Participants take a silent position on a spectrum between two extremes — then explain their choice. Surfaces diversity of thought without groupthink.",instructions:["Mark an imaginary line: one end = Strongly Agree, other = Strongly Disagree.","Read a statement. Everyone moves silently to their position — no talking.","Invite a few people at different positions to explain their thinking.","Repeat 4-6 times, mixing lighter questions with ones tied to your workshop theme."],facilTip:"The silence before sharing prevents groupthink and makes people commit to their real position first. Do not rush it.",facilScript:"Imagine a line — Strongly Agree here, Strongly Disagree there. Find your position silently — no peeking at others first. Then I'll ask a few of you to explain. First statement...",materials:"None (masking tape optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:27,name:"Silent Hands",type:"Icebreaker",minPeople:6,maxPeople:30,duration:8,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:false,space:["seated","limited","open"],description:"The spectrum exercise using hand height instead of moving. Best in groups of 6-10; split by table for larger groups. For big seated venues, use Silent Lines instead.",instructions:["Explain the scale: hand fully raised = Strongly Agree, fully lowered = Strongly Disagree.","Read a statement. Everyone silently places their hand at their position.","Invite a few people to share why their hand is where it is.","Repeat 4-6 times."],facilTip:"In restaurants or formal settings, this is the most dignified way to run a spectrum. For 20+ people, assign a facilitator per table.",facilScript:"Quick spectrum — with your hands. Fully up = strongly agree. Fully down = strongly disagree. In between = your honest position. Silently. Ready? First statement...",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:28,name:"Adjective + Name",type:"Icebreaker",minPeople:5,maxPeople:15,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["seated","limited","open"],description:"Each person pairs their name with an alliterative adjective and a mime — the group memorizes everyone's combo, then a fast-paced passing game begins.",instructions:["Each person picks an adjective starting with the same letter as their first name, adds a mime, and introduces themselves.","Go around — after each person, everyone repeats all previous combos from memory before adding the new one.","Start the game: say your combo, then immediately say someone else's. They must respond and pass it on.","Speed up. Optional elimination for hesitations or mistakes."],facilTip:"Do not skip the memorization round — it is the foundation that makes the game work.",facilScript:"An adjective starting with the same letter as your first name — and a mime. I'll go first: Daring Dinh [mime]. Everyone repeat. Then the next person — and we repeat all before adding theirs. Ready?",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
],
fr:[
  {id:9,name:"Power 8",type:"Energizer",minPeople:15,maxPeople:200,duration:4,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"Un compte à rebours pour libérer les tensions et recharger l'énergie du groupe. Rapide, universel, fonctionne pour toutes les tailles.",instructions:["Debout (ou assis si nécessaire).","Secouez la main droite en comptant depuis 8 : 8-7-6-5-4-3-2-1 !","Répétez avec la main gauche, le pied droit, le pied gauche.","Répétez la séquence depuis 4, puis 2, puis 1.","Terminez avec un grand saut, un applaudissement ou un cri !"],facilTip:"Fonctionne brillamment en ligne. Zéro gêne, énergie instantanée.",facilScript:"Levez-vous. Main droite, secouez 8 fois : 8, 7, 6, 5, 4, 3, 2, 1 ! Main gauche ! Pied droit ! Pied gauche ! Depuis 4... depuis 2... depuis 1 ! [Grand final !]",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:17,name:"Pierre-Papier-Ciseaux Géant",type:"Energizer",minPeople:15,maxPeople:200,duration:10,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Un tournoi de Pierre-Papier-Ciseaux à l'échelle de la salle, où les perdants deviennent des supporters passionnés.",instructions:["Tout le monde lève la main droite. Trouvez quelqu'un avec la main levée et jouez.","Le perdant devient le supporter du gagnant — le suit, scande son nom.","Les gagnants gardent la main levée. Les équipes de supporters grossissent.","Quand il ne reste que 2 finalistes, pausez et créez le suspense.","Compte à rebours vers la grande finale !"],facilTip:"Votre énergie fixe le niveau. Allez à fond pendant la finale — style commentateur sportif.",facilScript:"Tout le monde lève la main — vous êtes dans la partie. Trouvez quelqu'un et jouez. Le gagnant garde la main levée. Le perdant ? PLUS GRAND FAN. Suivez-les. Criez leur nom. Les deux derniers en finale. Prêts ? GO !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:18,name:"Le Nœud Humain",type:"Energizer",minPeople:6,maxPeople:200,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Tout le monde attrape des mains au hasard dans un cercle serré, créant un nœud humain à démêler sans jamais lâcher.",instructions:["Formez un cercle serré jusqu'à ce que les épaules se touchent presque.","Tout le monde lève la main droite et attrape la main de quelqu'un en face — pas d'un voisin.","Tout le monde lève la main gauche et attrape la main d'une autre personne.","Sans lâcher, démêlez-vous en passant par-dessus, par-dessous et à travers les autres.","Pause d'urgence : une paire peut se lâcher et se reconnecter une fois.","Pour 20+ : plusieurs cercles en compétition — le premier à se démêler gagne !"],facilTip:"Potentiel de débrief riche sur la dynamique d'équipe. Fonctionne mieux quand les gens résistent à trop diriger.",facilScript:"En cercle serré. Main droite, attrapez quelqu'un en face — pas votre voisin ! Main gauche, une autre personne. Sans lâcher, démêlez-vous. Par-dessus, par-dessous, tournez. Go !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:19,name:"Marchez dans la Salle",type:"Energizer",minPeople:8,maxPeople:100,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Un jeu de mouvement simple en apparence — le facilitateur donne des instructions, puis glisse une blague qui prend tout le monde par surprise.",instructions:["Tout le monde marche dans la salle. Le facilitateur appelle des actions numérotées.","1 = high five à la personne la plus proche. Pratiquez quelques fois.","2 = tout le monde saute. Mais juste après avoir annoncé 2, appelez immédiatement 1 !","Enrichissez : 3 = s'asseoir vite, 4 = former un groupe de 4 exactement.","Inventez de nouveaux numéros. Gardez le rythme rapide."],facilTip:"La blague ne fonctionne que si vous gardez un visage impassible.",facilScript:"Marchez dans la salle. 1 = high five à la personne la plus proche. Essayons : UN ! [répétez]. Maintenant 2 = tout le monde saute. Prêts ? UN ! [pause] UN ! [chaos]. DEUX ! Ha !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:10,name:"Zip Zap Zop",type:"Energizer",minPeople:8,maxPeople:40,duration:5,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Un jeu d'attention rapide où l'énergie circule dans le cercle avec des mots et du contact visuel.",instructions:["En cercle. Une personne pointe quelqu'un et dit Zip !","Cette personne pointe quelqu'un d'autre et dit Zap !","Cette personne pointe quelqu'un et dit Zop !","Continuez en accélérant progressivement.","Quiconque hésite ou dit le mauvais mot est éliminé !"],facilTip:"Démontrez avec enthousiasme. Parfait après le déjeuner.",facilScript:"En cercle. Trois mots : Zip, Zap, Zop — dans cet ordre, toujours. Pointez et dites ZIP. L'autre dit ZAP. Puis ZOP. Compris ? La vitesse augmente. Allons-y !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:11,name:"Ballon Sonore",type:"Energizer",minPeople:6,maxPeople:30,duration:7,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"Un ballon imaginaire circule avec des effets sonores. Ajoutez des ballons pour plus de chaos !",instructions:["En cercle. Une personne lance un ballon invisible avec un son (WHOOSH !).","Le receveur attrape avec un son et lance à quelqu'un.","Après 1 min, ajoutez un 2e ballon : super lourd, patate chaude, rebondissant...","Défi : gardez tous les ballons en l'air !"],facilTip:"Fonctionne en ligne aussi — lancez avec un geste et un son.",facilScript:"Nous avons un ballon invisible. Contact visuel, pointez, faites un son. J'ajoute un deuxième ballon — SUPER lourd. Prêts ?",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:12,name:"Miroir",type:"Energizer",minPeople:6,maxPeople:40,duration:7,objective:["energy","get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:true,space:["seated","limited","open","online"],description:"Les paires se reflètent mutuellement dans des mouvements lents — sans chef désigné au dernier tour.",instructions:["En paires. Face à face (ou caméras en ligne).","Une personne guide des mouvements lents ; l'autre reflète exactement.","Après 90 secondes, changez de rôles.","Tour 3 : pas de chef — bougez comme un seul.","Débrief : qu'avez-vous ressenti en guidant, suivant, partageant ?"],facilTip:"Le troisième tour sans chef est la magie. Une musique douce amplifie l'effet.",facilScript:"Face à face. L'un guide — au ralenti. L'autre reflète. Après 90 secondes : changez. Dernier tour : pas de chef. Bougez comme un seul. Commençons.",materials:"Aucun (musique calme optionnelle)",outcome:"Les participants se sentiront dynamisés et plus connectés aux personnes qui les entourent."},
  {id:14,name:"Ninja",type:"Energizer",minPeople:6,maxPeople:25,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Un jeu d'élimination dramatique de poses figées et de frappes uniques — haute énergie, fous rires garantis.",instructions:["En cercle. Sur 3-2-1-NINJA ! tout le monde saute dans une pose ninja figée.","Chaque joueur fait UNE frappe vers la main d'un voisin.","La cible peut esquiver avec UN mouvement. Si touchée, la main va dans le dos.","Deux mains perdues = éliminé. Le dernier ninja gagne !"],facilTip:"Modélisez avec un maximum de sérieux pour un maximum de rires.",facilScript:"En cercle. Sur 3-2-1, pose ninja la plus puissante. UNE frappe vers la main d'un voisin. Esquive avec UN mouvement. Deux mains perdues = éliminé. 3... 2... 1... NINJA !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:20,name:"Ho Ha He (Le Bûcheron)",type:"Energizer",minPeople:8,maxPeople:40,duration:8,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Un jeu en cercle de mimes précis et sons synchronisés — HO, HA, HE — de plus en plus rapide et chaotique.",instructions:["En cercle. Une personne crie HO ! en mimant une hache de haut en bas vers quelqu'un en face.","La personne ciblée crie HA ! en levant les deux mains vers le haut.","Les deux voisins crient HE ! et miment une coupe de chaque côté.","La personne ciblée devient le nouvel envoyeur. Accélérez.","Élimination optionnelle : quiconque hésite ou se trompe est éliminé."],facilTip:"Enseignez lentement d'abord — HO-HA-HE doit être compris avant d'accélérer.",facilScript:"HO ! [hache vers quelqu'un]. Cette personne : HA ! [mains vers le haut]. Ses voisins : HE ! [coupe de chaque côté]. Recommençons. Doucement... bien ! Plus vite. Plus fort. GO !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:16,name:"Tout le Monde Debout",type:"Energizer",minPeople:4,maxPeople:30,duration:5,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Des paires essaient de se lever ensemble dos à dos — puis élargissent progressivement aux groupes.",instructions:["Trouvez un partenaire. Dos à dos, genoux pliés, bras liés.","Levez-vous ensemble SANS utiliser vos mains.","Une fois réussi, rejoignez une autre paire (groupe de 4) et réessayez.","Continuez jusqu'au groupe entier.","Débrief : qu'est-ce qui a changé ?"],facilTip:"Belle métaphore de l'interdépendance. Vérifiez les limitations de mobilité.",facilScript:"Dos à dos sur le sol, liez les bras, genoux pliés. Levez-vous ensemble — sans mains. Une fois debout, rejoignez une autre paire. Continuez à grandir !",materials:"Aucun (espace au sol nécessaire)",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:21,name:"Tour de Présentation",type:"Icebreaker",minPeople:3,maxPeople:20,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Le classique tour de présentations — enrichi d'une question ciblée. Fonctionne dans n'importe quel contexte.",instructions:["Demandez à chacun de se présenter : nom, d'où il vient, ce qu'il fait.","Ajoutez une ou deux questions ciblées — personnelles, prospectives ou réflexives.","Faites le tour. Pour 15+, fixez une limite de temps (60 secondes).","Invitez le groupe à noter les points communs ou surprises."],facilTip:"La qualité de la question fait toute la différence. Visez quelque chose de personnel.",facilScript:"Prenons quelques minutes pour nous rencontrer. Votre nom, d'où vous venez — et [votre question]. Environ une minute. Je commence...",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:2,name:"Bingo Humain",type:"Icebreaker",minPeople:10,maxPeople:50,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["limited","open"],description:"Les participants circulent pour trouver des personnes correspondant aux descriptions — une façon dynamique de découvrir ce qui rend chacun unique.",instructions:["Distribuez des cartes bingo avec des traits personnalisés.","Lancez un minuteur. Les participants circulent et posent des questions.","Le premier à compléter une ligne crie BINGO !","Débrief : partagez la chose la plus surprenante découverte."],facilTip:"Personnalisez les traits selon votre contexte.",facilScript:"Vous avez une carte bingo. Trouvez quelqu'un qui correspond à chaque description — un nom par case. Premier à compléter une ligne : BINGO. 10 minutes — go !",materials:"Cartes bingo imprimées, stylos",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:3,name:"4 Coins",type:"Icebreaker",minPeople:10,maxPeople:100,duration:10,objective:["get-to-know","energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["open"],description:"Les participants se déplacent vers les coins selon leurs préférences — fait émerger similarités et différences de façon ludique.",instructions:["Étiquetez 4 coins (ex. Lève-tôt / Couche-tard / Selon les jours / Les deux).","Posez une question et tout le monde marche vers son coin.","Les gens discutent brièvement (1 min).","Répétez 4-6 fois, questions légères et liées au travail."],facilTip:"Mélangez des questions ludiques avec des questions significatives.",facilScript:"Quatre coins, chacun avec une option. Allez dans le coin qui vous représente le mieux. Pas de bonne ou mauvaise réponse. Première question...",materials:"4 étiquettes de coins",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et arriveront énergisés."},
  {id:22,name:"La Ligne de Vie",type:"Icebreaker",minPeople:4,maxPeople:30,duration:20,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"En paires ou trios, les participants partagent l'histoire de leur vie — de la naissance à aujourd'hui. L'un des exercices de connexion les plus puissants.",instructions:["En paires ou groupes de 3. Chaque personne partage son parcours de vie — moments clés, tournants, hauts et bas.","Optionnel : le narrateur et l'auditeur dessinent simultanément la ligne de vie.","Donnez 5-8 minutes par personne. L'auditeur écoute surtout.","Invitez quelques volontaires à partager une découverte sur leur partenaire."],facilTip:"La vulnérabilité est contagieuse. Si vous modélisez une vraie ouverture, la salle suivra.",facilScript:"En paires, partagez votre vie — de la naissance à aujourd'hui. Juste ce qui est important. Environ 7 minutes chacun. Votre partenaire écoute pleinement. Trouvez votre partenaire.",materials:"Papier et stylos (optionnel)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:5,name:"L'Île Déserte",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Naufragé sur une île déserte pendant un mois — quels 3 objets emportez-vous ? Un classique qui révèle la personnalité.",instructions:["Naufragé sur une île déserte pendant un mois — 3 objets seulement. Que choisissez-vous ?","2 minutes de réflexion individuelle.","Faites le tour — chaque personne partage ses 3 objets et pourquoi.","Débrief : patterns — pratiques vs créatifs vs émotionnels."],facilTip:"Contrainte : un objet utile au groupe, un personnel, un surprenant.",facilScript:"Naufragé sur une île déserte pendant un mois. Exactement 3 objets. 2 minutes pour décider. Puis nous partageons.",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:4,name:"Mon Superpouvoir",type:"Icebreaker",minPeople:5,maxPeople:25,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Chaque personne identifie et partage une force unique — son superpouvoir d'équipe.",instructions:["Si vous deviez nommer un superpouvoir unique que vous apportez à une équipe, lequel serait-ce ?","1 minute pour réfléchir.","Faites le tour — chaque personne partage en une phrase.","Optionnel : vote pour le combo d'équipe le plus puissant."],facilTip:"Cadrez-le légèrement — certaines personnes sont gênées de se mettre en avant.",facilScript:"Si vous aviez un superpouvoir — une force unique que vous apportez à une équipe — lequel ? 1 minute. Sérieux ou drôle. Nous partageons en une phrase.",materials:"Aucun (post-its optionnels)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:23,name:"Partage d'Objet",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Chaque personne apporte un objet significatif et partage l'histoire derrière. Simple, personnel et étonnamment touchant.",instructions:["Demandez aux participants d'apporter un objet significatif.","Faites le tour — montrez l'objet et expliquez (30-60 secondes).","Invitez une ou deux réactions.","Débrief optionnel : quels thèmes ont émergé ?"],facilTip:"Envoyez la consigne 24h avant. Partagez le vôtre en premier pour donner le ton.",facilScript:"Montrez votre objet, dites-nous ce que c'est et pourquoi vous l'avez apporté. Environ 45 secondes chacun.",materials:"Les participants apportent leur propre objet (consigne pré-atelier requise)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:24,name:"Association de Mots",type:"Icebreaker",minPeople:2,maxPeople:5,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Tout le monde dit un mot que fait penser une personne — puis cette personne répond avec des histoires. Intime, révélateur et souvent surprenant.",instructions:["Concentrez-vous sur une personne. Tous les autres disent un mot instinctivement.","La personne partage une histoire ou réflexion liée à chaque mot.","Tournez jusqu'à ce que tout le monde soit passé.","Version étendue (30 min) : plus de mots et narration approfondie."],facilTip:"Les mots révèlent autant sur les locuteurs que sur la personne au centre.",facilScript:"Une personne sur le siège chaud — tous donnent un mot instinctif. Puis la personne répond à chaque mot avec une histoire. Je commence sur le siège chaud.",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},

function useFavourites() {
  const [favs,setFavs]=useState([]);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    try{const s=localStorage.getItem(STORAGE_KEY);if(s)setFavs(JSON.parse(s));}catch(e){}
    setLoaded(true);
  },[]);
  const toggle=(id)=>{
    const next=favs.includes(id)?favs.filter(f=>f!==id):[...favs,id];
    setFavs(next);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(next));}catch(e){}
  };
  return{favs,toggle,loaded};
}

function FilterFlow({t,onApply}){
  const [step,setStep]=useState(0);
  const [filters,setFilters]=useState({people:"",duration:"",objective:"",familiarity:"",space:"",format:""});
  const steps=[
    {key:"people",emoji:"👥",label:t.q1,options:t.q1o},
    {key:"familiarity",emoji:"🤝",label:t.q2,options:t.q2o},
    {key:"objective",emoji:"🎯",label:t.q3,options:t.q3o},
    {key:"duration",emoji:"⏱️",label:t.q4,options:t.q4o},
    {key:"space",emoji:"📍",label:t.q5,options:t.q5o},
  ];
  const current=steps[step];
  const pct=Math.round((step/steps.length)*100);
  const select=(val)=>{
    const nf={...filters,[current.key]:val};
    if(current.key==="space"&&val==="online")nf.format="online";
    setFilters(nf);
    if(step<steps.length-1)setStep(s=>s+1);
    else onApply(nf);
  };
  return(
    <div style={{paddingTop:28}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style={{fontSize:12,color:C.muted}}>{t.step(step+1,steps.length)}</span>
        <span style={{fontSize:12,color:C.muted}}>{pct}%</span>
      </div>
      <div style={{height:5,background:C.border,borderRadius:4,marginBottom:32,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:C.red,borderRadius:4,transition:"width 0.3s"}}/>
      </div>
      <div style={{fontSize:30,marginBottom:8}}>{current.emoji}</div>
      <h2 style={{margin:"0 0 22px",fontSize:22,fontWeight:900}}>{current.label}</h2>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {current.options.map(opt=>(
          <button key={opt.value} onClick={()=>select(opt.value)}
            onMouseEnter={e=>{e.currentTarget.style.background=C.redLight;e.currentTarget.style.borderColor=`${C.red}60`;e.currentTarget.style.color=C.red;}}
            onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.dark;}}
            style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:14,padding:"14px 18px",cursor:"pointer",color:C.dark,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.15s"}}>
            <div>
              <div style={{fontSize:15,fontWeight:700}}>{opt.label}</div>
              {opt.sub&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{opt.sub}</div>}
            </div>
            <span style={{color:C.border,fontSize:16}}>→</span>
          </button>
        ))}
      </div>
      <button onClick={()=>onApply(filters)} style={{marginTop:20,background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,width:"100%",textAlign:"center"}}>{t.skipFilters}</button>
    </div>
  );
}

  const copyToClipboard=async()=>{
    const txt=[activity.name,"",`${activity.duration} ${t.min} | ${activity.minPeople}-${activity.maxPeople} ${t.people} | ${en.label[lang]}`,`${t.materials}: ${activity.materials}`,"",activity.description,"",activity.instructions.map((s,i)=>`${i+1}. ${s}`).join("\n"),"",activity.facilScript,"",activity.facilTip,"",activity.outcome,"","— Movers Companion"].join("\n");
    try{await navigator.clipboard.writeText(txt);}catch(e){const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;opacity:0;top:0;left:0;";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);}
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  };

  const printAsPDF=()=>{
    const content=[activity.name,"",`${activity.duration} ${t.min} | ${activity.minPeople}-${activity.maxPeople} ${t.people}`,`${t.materials}: ${activity.materials}`,"",`-- ${t.howToRun.toUpperCase()} --`,activity.instructions.map((s,i)=>`${i+1}. ${s}`).join("\n"),"",`-- ${t.facilScript.toUpperCase()} --`,activity.facilScript,"",`-- ${t.facilTip.toUpperCase()} --`,activity.facilTip,"",`-- ${t.outcome.toUpperCase()} --`,activity.outcome,"","— Movers Companion"].join("\n");
    const ta=document.createElement("textarea");ta.value=content;ta.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;font-family:monospace;font-size:13px;padding:24px;box-sizing:border-box;background:#fff;color:#000;border:none;resize:none;";
    const closeBtn=document.createElement("button");closeBtn.innerText=t.close;closeBtn.style.cssText="position:fixed;top:16px;right:16px;z-index:10000;background:#fa4e50;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;";
    const printBtn=document.createElement("button");printBtn.innerText=t.print;printBtn.style.cssText="position:fixed;top:16px;right:160px;z-index:10000;background:#009c93;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;";
    document.body.appendChild(ta);document.body.appendChild(closeBtn);document.body.appendChild(printBtn);ta.select();
    closeBtn.onclick=()=>{document.body.removeChild(ta);document.body.removeChild(closeBtn);document.body.removeChild(printBtn);};
    printBtn.onclick=()=>window.print();
  };

  return(
    <div style={{paddingTop:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{background:tp.bg,border:`1px solid ${tp.color}40`,color:tp.color,borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:800}}>{TYPE_LABEL_LOCAL[lang][activity.type]}</span>
        <button onClick={onToggleFav} style={{background:"none",border:"none",cursor:"pointer",fontSize:24,padding:4}} className="no-print">{isFav?"❤️":"🤍"}</button>
      </div>
      <h1 style={{margin:"0 0 8px",fontSize:24,fontWeight:900,lineHeight:1.2}}>{activity.name}</h1>
      <p style={{margin:"0 0 20px",color:C.mid,fontSize:14,lineHeight:1.65}}>{activity.description}</p>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24}}>
        {[{icon:"⏱",label:`${activity.duration} ${t.min}`},{icon:"👥",label:`${activity.minPeople}-${activity.maxPeople} ${t.people}`},{icon:en.emoji,label:en.label[lang],color:en.color,bg:en.color+"12"},{icon:"🎒",label:activity.materials}].map((c,i)=>(
          <div key={i} style={{background:c.bg||C.cream,border:`1px solid ${(c.color||C.border)}30`,borderRadius:12,padding:"8px 12px",fontSize:12,color:c.color||C.mid,display:"flex",alignItems:"center",gap:6,fontWeight:600}}>{c.icon} {c.label}</div>
        ))}
        {activity.space.map(s=>(
          <div key={s} style={{background:C.cream,border:`1px solid ${C.border}`,borderRadius:12,padding:"8px 12px",fontSize:12,color:C.mid,display:"flex",alignItems:"center",gap:6,fontWeight:600}}>{SPACE_META[lang][s].emoji} {SPACE_META[lang][s].label}</div>
        ))}
      </div>
      <div className="no-print" style={{display:"flex",gap:10,marginBottom:28}}>
        <button onClick={copyToClipboard} style={{flex:1,background:copied?"#e6f7f6":"#fff",border:`1.5px solid ${copied?C.teal:C.border}`,borderRadius:12,padding:"11px 16px",cursor:"pointer",fontSize:13,fontWeight:700,color:copied?C.teal:C.mid,transition:"all 0.2s"}}>{copied?t.copied:t.copy}</button>
        <button onClick={printAsPDF} style={{flex:1,background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px 16px",cursor:"pointer",fontSize:13,fontWeight:700,color:C.mid}}>{t.savePDF}</button>
      </div>
      <Section title={t.howToRun}>
        {activity.instructions.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:14,marginBottom:16}}>
            <div style={{minWidth:28,height:28,borderRadius:"50%",background:tp.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,flexShrink:0}}>{i+1}</div>
            <div style={{color:C.mid,fontSize:14,lineHeight:1.65,paddingTop:4}}>{s}</div>
          </div>
        ))}
      </Section>
      <Section title={t.facilScript}>
        <div style={{background:"#fffff4",border:`1.5px solid ${C.border}`,borderLeft:"4px solid #e07b00",borderRadius:"0 12px 12px 0",padding:"14px 18px",fontSize:14,color:C.mid,lineHeight:1.8,fontStyle:"italic"}}>🎤 {activity.facilScript}</div>
      </Section>
      <Section title={t.facilTip}>
        <div style={{background:tp.lightBg,border:`1.5px solid ${tp.color}30`,borderLeft:`4px solid ${tp.color}`,borderRadius:"0 12px 12px 0",padding:"14px 18px",fontSize:14,color:C.mid,lineHeight:1.65}}>💡 {activity.facilTip}</div>
      </Section>
      <Section title={t.outcome}>
        <div style={{background:C.cream,border:`1.5px solid ${C.border}`,borderLeft:`4px solid ${C.teal}`,borderRadius:"0 12px 12px 0",padding:"14px 18px",fontSize:14,color:C.mid,lineHeight:1.65}}>✨ {activity.outcome}</div>
      </Section>
    </div>
  );
}

function Section({title,children}){
  return <div style={{marginBottom:28}}><h3 style={{margin:"0 0 14px",fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:1.2}}>{title}</h3>{children}</div>;
}

function EmptyState({onRetry,t}){
  return(
    <div style={{textAlign:"center",padding:"48px 0",color:C.muted}}>
      <div style={{fontSize:44,marginBottom:14}}>🔍</div>
      <p style={{margin:"0 0 20px",fontSize:15}}>{t.noMatch}</p>
      <button onClick={onRetry} style={{background:C.red,border:"none",color:"#fff",borderRadius:20,padding:"11px 24px",cursor:"pointer",fontSize:14,fontWeight:800}}>{t.adjustBtn}</button>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
  </script>
</body>
</html>
