const EN_ACTIVITIES = [
  {id:9,name:"Power 8",type:"Energizer",minPeople:15,maxPeople:200,duration:4,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"A countdown shake-out to release tension and reset the room's energy. Fast, universal, works for any size.",instructions:["Stand up (or stay seated if needed).","Shake your right hand counting down from 8: 8-7-6-5-4-3-2-1!","Repeat with left hand, right foot, left foot — 8 counts each.","Repeat the whole sequence from 4, then 2, then 1.","End with a big jump, clap, or cheer!"],facilTip:"Works brilliantly online — everyone does it at their desk. Zero awkwardness, instant energy.",facilScript:"Stand up — or stay seated if you need to. We are going to shake out the energy. Right hand: 8, 7, 6, 5, 4, 3, 2, 1! Left hand! Right foot! Left foot! Now from 4... from 2... from 1! [Big finish!]",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:17,name:"Giant Rock-Paper-Scissors",type:"Energizer",minPeople:15,maxPeople:200,duration:10,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"A whole-room Rock-Paper-Scissors tournament where losers become passionate cheerleaders — building into an epic, crowd-fueled final.",instructions:["Everyone raises their right hand to signal availability. Find someone with their hand up and play Rock-Paper-Scissors.","The loser becomes the winner's personal cheerleader — following them, chanting their name.","Winners keep their hand up and find new opponents. Cheer squads grow bigger every round.","When only 2 finalists remain, pause. Interview them, build the hype.","Count down to the grand final: best of 3 or best of 5!"],facilTip:"Your energy sets the ceiling. Go all-in during the final — sports commentator vibe. The bigger the drama, the more memorable.",facilScript:"Everyone raise your right hand — you are in. Find someone with their hand up and play. Winner stays in, hand stays up. Loser? You are now their BIGGEST FAN. Follow them. Scream their name. Last two face off in the grand final. Ready? GO!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:18,name:"Human Knot",type:"Energizer",minPeople:6,maxPeople:200,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Everyone grabs random hands across a tight circle, creating a human knot the group must untangle without ever letting go.",instructions:["Stand in a circle, then step inward until shoulders are almost touching.","Everyone raises their right hand and grabs someone's hand across the circle — not a neighbor's.","Everyone raises their left hand and grabs a different person's hand — not a neighbor's.","Without releasing, untangle back into a circle by stepping over, under, and through each other.","Emergency break allowed: one pair may release and reconnect once. Two interlocked circles also count!","For 20+ people: split into circles and race — first to untangle wins!"],facilTip:"Rich debrief on team dynamics. Works best when people resist over-directing and experiment instead.",facilScript:"Everyone in a circle — step in until it is tight. Right hand up, grab someone across — not your neighbor! Left hand up, grab a different person. Without letting go, untangle yourselves. Step over, duck under, twist around. Go!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:19,name:"Walk Around the Room",type:"Energizer",minPeople:8,maxPeople:100,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"A deceptively simple movement game — the facilitator calls numbers with actions, then sneaks in a trick that triggers real laughter.",instructions:["Everyone walks freely around the room. The facilitator calls numbered actions.","1 = high five the nearest person. Practice a few times.","2 = everyone jumps. But right after announcing 2, call 1 again — some people will jump on instinct!","Build: 3 = sit down fast, 4 = form a group of exactly 4, and so on.","Invent new numbers on the fly. Keep the pace quick and surprises coming."],facilTip:"The trick only works with a completely straight face. The moment of confusion is the whole payoff.",facilScript:"Walk around the room. 1 = high five the nearest person. Let's try: ONE! [repeat]. Now 2 = everyone jumps. Ready? ONE! [pause] ONE! [watch the chaos]. TWO! Ha! Let's keep going...",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:10,name:"Zip Zap Zop",type:"Energizer",minPeople:8,maxPeople:40,duration:5,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"A fast-paced attention game where energy passes around the circle with words and eye contact.",instructions:["Stand in a circle. One person points to someone and says Zip!","That person points to another and says Zap!","That person points to someone and says Zop!","Continue cycling: Zip, Zap, Zop... Speed up gradually.","Anyone who hesitates or says the wrong word is out!"],facilTip:"Demonstrate with exaggerated enthusiasm. Perfect right after lunch to re-energize the room.",facilScript:"Stand in a circle. Three words: Zip, Zap, Zop — in that order, always. Point and say ZIP. They say ZAP. That person says ZOP. Speed increases. Anyone who hesitates is out. Let's go!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:11,name:"Soundball",type:"Energizer",minPeople:6,maxPeople:30,duration:7,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"An imaginary ball is thrown around with a sound effect. Add more balls to increase the chaos!",instructions:["Stand or sit in a circle. One person throws an invisible ball with a sound (WHOOSH!).","The receiver catches it with a sound and throws to someone else.","After 1 min, add a 2nd ball: super heavy, hot potato, bouncy...","Challenge: keep all balls going simultaneously!"],facilTip:"Works online too — throw with a camera gesture and sound. Great focus-builder for virtual sessions.",facilScript:"We have an invisible ball. Make eye contact, point, and make a sound. The louder and weirder the better. I am adding a second ball — SUPER heavy. Ready?",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:12,name:"Mirror",type:"Energizer",minPeople:6,maxPeople:40,duration:7,objective:["energy","get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:true,space:["seated","limited","open","online"],description:"Pairs mirror each other's slow movements — with no designated leader in the final round.",instructions:["Pair up. Face each other or use cameras online.","One person leads slow movements; the other mirrors exactly.","After 90 seconds, swap roles.","Round 3: no designated leader — try to move as one.","Debrief: what did it feel like to lead, follow, or share leadership?"],facilTip:"The third round with no leader is the magic. Soft background music enhances the effect.",facilScript:"Find a partner, face each other. One leads — move slowly. The other mirrors exactly. After 90 seconds I say switch. Then the last round: no leader. Move as one. Let's begin.",materials:"None (calm music optional)",outcome:"Participants will feel re-energized and more connected to the people around them."},
  {id:14,name:"Ninja",type:"Energizer",minPeople:6,maxPeople:25,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"A dramatic elimination game of frozen poses and single strikes — high energy, huge laughs.",instructions:["Stand in a circle. On 3-2-1-NINJA! everyone jumps into a frozen ninja pose.","Clockwise, each player makes ONE strike motion toward a neighbor's hand.","The target can dodge with ONE move. If hit, that hand goes behind their back.","Two hands lost = eliminated. Last ninja standing wins!"],facilTip:"Model it with maximum seriousness for maximum laughs. The dramatic posing sets the whole vibe.",facilScript:"Everyone in a circle. On 3-2-1, jump into your most powerful ninja pose and freeze. ONE strike at a neighbor's hand. They can dodge with ONE move. Two hands lost = eliminated. 3... 2... 1... NINJA!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:20,name:"Ho Ha He (Butcher)",type:"Energizer",minPeople:8,maxPeople:40,duration:8,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"A circle game of sharp mimes and synchronized sounds — HO, HA, HE — getting faster, louder, and more chaotic each round.",instructions:["Stand in a circle. One person yells HO! miming a chopping motion top to bottom toward someone across.","That person yells HA! lifting both hands upward.","Their two neighbors yell HE! and mime slicing inward from each side.","The targeted person becomes the new sender. Speed up each round.","Optional: anyone who hesitates or makes a mistake is out. Last three win."],facilTip:"Teach slowly first — HO-HA-HE must click before you accelerate. Encourage maximum volume.",facilScript:"Watch: HO! [chop downward]. That person: HA! [hands up]. Their neighbors: HE! [slice inward]. Then it starts again. Slow first... good! Now faster. Louder. GO!",materials:"None",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},

  {id:13,name:"Back to Back Rise",type:"Energizer",minPeople:4,maxPeople:30,duration:5,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Pairs try to stand up together from seated back-to-back — then scale to bigger groups.",instructions:["Find a partner. Sit back-to-back, knees bent, arms linked.","Try to stand up together WITHOUT using your hands.","Once up, join another pair (group of 4) and try again.","Keep adding people until the whole group attempts it together.","Debrief: what changed as the group got larger?"],facilTip:"Beautiful metaphor for interdependence. Check for mobility limitations beforehand.",facilScript:"Back-to-back on the floor, link arms, knees bent. Stand up together — without hands. Once up, grab another pair and try as 4. Keep growing!",materials:"None (clear floor space needed)",outcome:"Participants will feel physically activated, mentally present, and ready to engage with full energy."},
  {id:29,name:"Walk in the Forest",type:"Energizer",minPeople:4,maxPeople:200,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["seated","limited","open"],description:"The facilitator narrates a forest walk — then launches surprise obstacles (a bear, a branch, roots, mosquitoes) that trigger wild physical reactions. Chaos, laughter, full presence guaranteed.",instructions:["Ask everyone to stand up. Tell them to close their eyes and imagine they are walking through a beautiful forest. Start walking on the spot — legs moving, body still.","Narrate calmly: birds singing, sun through the trees, soft ground underfoot.","Then launch a surprise: Oh no — A BEAR! RUN! Everyone runs on the spot frantically.","Bring it back: It's OK, we left the bear behind. Walk normally. Nice and peaceful again...","Keep adding obstacles and reactions — branch (duck down), tree roots (jump repeatedly), puddle (giant leap), mosquitoes (swat wildly all around).","Vary the pace between peaceful calm and sudden chaos. End on a peaceful clearing — deep breath, well done everyone."],facilTip:"The magic is in your storytelling voice. Build suspense before each surprise, then react fully yourself — the group mirrors your energy. The contrast between peaceful walking and sudden chaos is what gets the laughs.",facilScript:"Everyone stand up. Close your eyes. We are walking through a beautiful forest... feel the ground under your feet... start walking... birds singing... so peaceful... wait... do you hear that?... OH NO — A BEAR!! RUN RUN RUN! [everyone runs on the spot] ...OK OK, we lost it, slow down... walk normally... that was close... OH CAREFUL — a branch! [duck!] ...phew... keep walking... ROOTS EVERYWHERE! [jump jump jump] ...nearly there... oh no MOSQUITOES! [swat wildly] ...OK they're gone... and here we are — a beautiful clearing. Deep breath. Well done everyone.",materials:"None",outcome:"Participants will feel physically activated, fully present, and united by shared laughter — a perfect re-energiser at any point in the session."},
  {id:21,name:"Circle of Introductions",type:"Icebreaker",minPeople:3,maxPeople:20,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"The classic round of introductions — elevated with a thoughtful prompt. Works in any setting, even when no one can move.",instructions:["Ask everyone to introduce themselves: name, where they are from, what they do.","Add one or two targeted prompts — something personal, forward-looking, or reflective.","Go around. For 15+ people, give a strict time limit (e.g. 60 seconds each).","After everyone has shared, invite the group to notice patterns or surprises."],facilTip:"The prompt is everything. What is one thing people would not guess from your job title? yields far richer sharing than tell us about your role.",facilScript:"Let's meet each other. Share your name, where you are from — and [your prompt]. About a minute each. I'll go first.",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:2,name:"Human Bingo",type:"Icebreaker",minPeople:10,maxPeople:50,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["limited","open"],description:"Participants mingle to find people matching descriptions on their bingo card — a high-energy way to discover what makes each person unique.",instructions:["Hand out bingo cards with traits like speaks 3 languages or has lived in 3 countries.","Set a timer. Participants mingle and ask questions to fill their card.","First to complete a line (or full card) shouts BINGO!","Debrief: share the most surprising thing you discovered."],facilTip:"Customize traits to your group context.",facilScript:"You each have a bingo card. Find someone who matches each description and write their name. One person per box! First to complete a line shouts BINGO. 10 minutes — go!",materials:"Printed bingo cards, pens",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:3,name:"4 Corners",type:"Icebreaker",minPeople:10,maxPeople:100,duration:10,objective:["get-to-know","energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["open"],description:"Participants move to room corners based on preferences — surfaces similarities and differences in a playful, physical way.",instructions:["Label 4 corners (e.g. Early Bird / Night Owl / Depends / Both).","Ask a question and everyone walks to their corner.","People briefly chat with others in their corner (1 min).","Repeat 4-6 times, mixing fun and work-relevant questions."],facilTip:"Mix playful questions (tea vs coffee) with meaningful ones (solo vs collaborative work).",facilScript:"Four corners, each with an option. Walk to the corner that best represents you. No right or wrong answers — 1 minute to chat with your corner. Ready? First question...",materials:"4 corner labels (printed or flipchart paper)",outcome:"Participants will feel more comfortable, learn about each other, and arrive energized for the session ahead."},
  {id:22,name:"Life Line",type:"Icebreaker",minPeople:4,maxPeople:30,duration:20,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"In pairs or trios, participants share the story of their life — from birth to today. One of the most powerful connection exercises there is.",instructions:["Pair up or form groups of 3. Each person shares their life journey — key moments, turning points, highs and lows.","Optional: both sharer and listener draw the life line on paper simultaneously.","Give each person 5-8 minutes. The listener mostly listens, can ask 1-2 questions at the end.","If time allows, invite volunteers to share one thing they discovered about their partner."],facilTip:"Vulnerability is contagious. Model genuine openness in your instructions and the room will follow.",facilScript:"In pairs, share your life — from birth to now. Not everything, just what feels important. About 7 minutes each. Your partner listens fully. Find your partner.",materials:"Paper and pens (optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:5,name:"Desert Island",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Stranded on a desert island for a month — what 3 items do you bring? A timeless classic that reveals personality.",instructions:["Stranded on a deserted island for one month — 3 items only. What do you choose?","Give 2 minutes for individual thinking.","Go around — each person shares their 3 items and why.","Debrief: notice patterns — practical vs creative vs emotional choices."],facilTip:"Add a twist: one item must be useful for the group, one personal, one surprising.",facilScript:"Stranded on a deserted island for one month. Exactly 3 items. 2 minutes to decide. Then we share. I am curious what you will choose...",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:4,name:"My Superpower",type:"Icebreaker",minPeople:5,maxPeople:25,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Each person identifies one unique strength — framed as their team superpower. A confidence-building opener that surfaces collective talent.",instructions:["Prompt: If you had to name one unique superpower you bring to a team, what would it be?","Give 1 minute to think (can jot it down).","Go around — each person shares in one sentence.","Optional: the group votes for the most powerful team combo."],facilTip:"Frame it lightly — some people feel shy about self-promotion. Humor is very welcome!",facilScript:"If you had a superpower — one unique strength you bring to a team — what would it be? 1 minute to think. Serious or funny. We go around and share in one sentence.",materials:"None (sticky notes optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:23,name:"Item Share",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Each person brings one meaningful object and shares the story behind it. Simple, personal, and surprisingly moving.",instructions:["Before the session, ask participants to bring one meaningful object — personal, symbolic, or professional.","Go around — each person shows their item and explains what it is and why (30-60 seconds).","Invite one or two reactions or questions from the group.","Optional debrief: what patterns or themes emerged?"],facilTip:"Send the prompt at least 24 hours before. Share your own object first to set the tone.",facilScript:"I asked you to bring one object that means something to you. Let's go around. Hold it up, tell us what it is and why you brought it. About 45 seconds each. Who wants to go first?",materials:"Participants bring their own item (pre-workshop prompt required)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:24,name:"Word Association",type:"Icebreaker",minPeople:2,maxPeople:5,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Everyone says one word a person makes them think of — then that person responds with stories connected to each word. Intimate, revealing, often surprising.",instructions:["Focus on one person. Everyone else says one word this person makes them think of — instinctive, no filtering.","The person takes each word and shares a story, memory, or reflection connected to it.","Rotate until everyone has had their turn.","Optional extended version (30 min): more words and deeper storytelling per person."],facilTip:"The words reveal as much about the speakers as about the person in the hot seat. Point this out in the debrief.",facilScript:"One person is in the hot seat — everyone gives them one word. The first word that comes to mind. Then the person responds to each word with a story. I'll go first in the hot seat. What word comes to mind when you think of me?",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:25,name:"Powerful Questions",type:"Icebreaker",minPeople:6,maxPeople:100,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["limited","open"],description:"Each person crafts one powerful question, then mingles to ask and answer with different partners — sparking genuine one-on-one conversations.",instructions:["Explain what makes a question powerful: open-ended, thought-provoking. Give a good and bad example.","Give 2 minutes to write their question (sticky note optional).","Everyone raises their hand. Find a partner, ask each other your questions, and really listen.","When done, hand up and find a new partner. Repeat 3-5 rounds.","Debrief: what was the most powerful question you heard?"],facilTip:"Bad: What do you do? Good: What is a belief you hold that most people in your field would disagree with?",facilScript:"Write one powerful question — something real. Two minutes. Raise your hand. Find someone else with their hand up. Ask, listen. When done, hand up again. Go!",materials:"Sticky notes and pens (optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:26,name:"Silent Lines",type:"Icebreaker",minPeople:8,maxPeople:200,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["limited","open"],description:"Participants take a silent position on a spectrum between two extremes — then explain their choice. Surfaces diversity of thought without groupthink.",instructions:["Mark an imaginary line: one end = Strongly Agree, other = Strongly Disagree.","Read a statement. Everyone moves silently to their position — no talking.","Invite a few people at different positions to explain their thinking.","Repeat 4-6 times, mixing lighter questions with ones tied to your workshop theme."],facilTip:"The silence before sharing prevents groupthink and makes people commit to their real position first.",facilScript:"Imagine a line — Strongly Agree here, Strongly Disagree there. Find your position silently. Then I'll ask a few of you to explain. First statement...",materials:"None (masking tape optional)",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:27,name:"Silent Hands",type:"Icebreaker",minPeople:6,maxPeople:30,duration:8,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:false,space:["seated","limited","open"],description:"The spectrum exercise using hand height instead of moving. Best in groups of 6-10; split by table for larger groups. For big seated venues, use Silent Lines instead.",instructions:["Explain the scale: hand fully raised = Strongly Agree, fully lowered = Strongly Disagree.","Read a statement. Everyone silently places their hand at their position.","Invite a few people to share why their hand is where it is.","Repeat 4-6 times."],facilTip:"In restaurants or formal settings, this is the most dignified way to run a spectrum.",facilScript:"Quick spectrum — with your hands. Fully up = strongly agree. Fully down = strongly disagree. In between = your honest position. Silently. Ready? First statement...",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
  {id:28,name:"Adjective + Name",type:"Icebreaker",minPeople:5,maxPeople:15,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["seated","limited","open"],description:"Each person pairs their name with an alliterative adjective and a mime — the group memorizes everyone's combo, then a fast-paced passing game begins.",instructions:["Each person picks an adjective starting with the same letter as their first name, adds a mime, and introduces themselves.","Go around — after each person, everyone repeats all previous combos from memory before adding the new one.","Start the game: say your combo, then immediately say someone else's. They must respond and pass it on.","Speed up. Optional elimination for hesitations or mistakes."],facilTip:"Do not skip the memorization round — it is the foundation that makes the game work.",facilScript:"An adjective starting with the same letter as your first name — and a mime. I'll go first: Amazing Anna [mime]. Everyone repeat. Then the next person — and we repeat all before adding theirs. Ready?",materials:"None",outcome:"Participants will feel more at ease, discover something new about each other, and build early connection."},
];

const FR_ACTIVITIES = [
  {id:9,name:"Power 8",type:"Energizer",minPeople:15,maxPeople:200,duration:4,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"Un compte à rebours pour libérer les tensions et recharger l'énergie du groupe. Rapide, universel, fonctionne pour toutes les tailles.",instructions:["Debout (ou assis si nécessaire).","Secouez la main droite en comptant depuis 8 : 8-7-6-5-4-3-2-1 !","Répétez avec la main gauche, le pied droit, le pied gauche.","Répétez la séquence depuis 4, puis 2, puis 1.","Terminez avec un grand saut, un applaudissement ou un cri !"],facilTip:"Fonctionne brillamment en ligne. Zéro gêne, énergie instantanée.",facilScript:"Levez-vous. Main droite : 8, 7, 6, 5, 4, 3, 2, 1 ! Main gauche ! Pied droit ! Pied gauche ! Depuis 4... depuis 2... depuis 1 ! [Grand final !]",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:17,name:"Pierre-Papier-Ciseaux Géant",type:"Energizer",minPeople:15,maxPeople:200,duration:10,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Un tournoi de Pierre-Papier-Ciseaux à l'échelle de la salle, où les perdants deviennent des supporters passionnés.",instructions:["Tout le monde lève la main droite. Trouvez quelqu'un et jouez.","Le perdant devient le supporter du gagnant — le suit, scande son nom.","Les gagnants gardent la main levée. Les équipes de supporters grossissent.","Quand il ne reste que 2 finalistes, créez le suspense.","Compte à rebours vers la grande finale !"],facilTip:"Votre énergie fixe le niveau. Allez à fond pendant la finale — style commentateur sportif.",facilScript:"Tout le monde lève la main — vous êtes dans la partie. Trouvez quelqu'un et jouez. Le gagnant garde la main. Le perdant ? PLUS GRAND FAN. Suivez-les. Criez leur nom. Les deux derniers en finale. GO !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:18,name:"Le Nœud Humain",type:"Energizer",minPeople:6,maxPeople:200,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Tout le monde attrape des mains au hasard dans un cercle serré, créant un nœud humain à démêler sans jamais lâcher.",instructions:["Formez un cercle serré jusqu'à ce que les épaules se touchent presque.","Tout le monde lève la main droite et attrape la main de quelqu'un en face — pas d'un voisin.","Tout le monde lève la main gauche et attrape la main d'une autre personne.","Sans lâcher, démêlez-vous en passant par-dessus, par-dessous et à travers.","Pause d'urgence : une paire peut se lâcher et se reconnecter une fois.","Pour 20+ : plusieurs cercles en compétition — le premier à se démêler gagne !"],facilTip:"Potentiel de débrief riche sur la dynamique d'équipe.",facilScript:"En cercle serré. Main droite, attrapez quelqu'un en face — pas votre voisin ! Main gauche, une autre personne. Sans lâcher, démêlez-vous. Go !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:19,name:"Marchez dans la Salle",type:"Energizer",minPeople:8,maxPeople:100,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Un jeu de mouvement simple en apparence — le facilitateur donne des instructions, puis glisse une blague qui prend tout le monde par surprise.",instructions:["Tout le monde marche dans la salle. Le facilitateur appelle des actions numérotées.","1 = high five à la personne la plus proche. Pratiquez quelques fois.","2 = tout le monde saute. Mais juste après avoir annoncé 2, appelez immédiatement 1 !","Enrichissez : 3 = s'asseoir vite, 4 = former un groupe de 4 exactement.","Inventez de nouveaux numéros. Gardez le rythme rapide."],facilTip:"La blague ne fonctionne que si vous gardez un visage impassible.",facilScript:"Marchez dans la salle. 1 = high five. Essayons : UN ! [répétez]. Maintenant 2 = sauter. Prêts ? UN ! [pause] UN ! [chaos]. DEUX ! Ha !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:10,name:"Zip Zap Zop",type:"Energizer",minPeople:8,maxPeople:40,duration:5,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Un jeu d'attention rapide où l'énergie circule dans le cercle avec des mots et du contact visuel.",instructions:["En cercle. Une personne pointe quelqu'un et dit Zip !","Cette personne pointe quelqu'un d'autre et dit Zap !","Cette personne pointe quelqu'un et dit Zop !","Continuez en accélérant progressivement.","Quiconque hésite ou dit le mauvais mot est éliminé !"],facilTip:"Démontrez avec enthousiasme. Parfait après le déjeuner.",facilScript:"En cercle. Trois mots : Zip, Zap, Zop — dans cet ordre. Pointez et dites ZIP. ZAP. ZOP. Compris ? La vitesse augmente. Allons-y !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:11,name:"Ballon Sonore",type:"Energizer",minPeople:6,maxPeople:30,duration:7,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"Un ballon imaginaire circule avec des effets sonores. Ajoutez des ballons pour plus de chaos !",instructions:["En cercle. Une personne lance un ballon invisible avec un son (WHOOSH !).","Le receveur attrape avec un son et lance à quelqu'un.","Après 1 min, ajoutez un 2e ballon : super lourd, patate chaude, rebondissant...","Défi : gardez tous les ballons en l'air !"],facilTip:"Fonctionne en ligne aussi — lancez avec un geste et un son.",facilScript:"Nous avons un ballon invisible. Contact visuel, pointez, faites un son. J'ajoute un deuxième ballon — SUPER lourd. Prêts ?",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:12,name:"Miroir",type:"Energizer",minPeople:6,maxPeople:40,duration:7,objective:["energy","get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:true,space:["seated","limited","open","online"],description:"Les paires se reflètent mutuellement dans des mouvements lents — sans chef désigné au dernier tour.",instructions:["En paires. Face à face (ou caméras en ligne).","Une personne guide des mouvements lents ; l'autre reflète exactement.","Après 90 secondes, changez de rôles.","Tour 3 : pas de chef — bougez comme un seul.","Débrief : qu'avez-vous ressenti ?"],facilTip:"Le troisième tour sans chef est la magie. Une musique douce amplifie l'effet.",facilScript:"Face à face. L'un guide — au ralenti. L'autre reflète. Après 90 secondes : changez. Dernier tour : pas de chef. Bougez comme un seul. Commençons.",materials:"Aucun (musique calme optionnelle)",outcome:"Les participants se sentiront dynamisés et plus connectés aux personnes qui les entourent."},
  {id:14,name:"Ninja",type:"Energizer",minPeople:6,maxPeople:25,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Un jeu d'élimination dramatique de poses figées et de frappes uniques — haute énergie, fous rires garantis.",instructions:["En cercle. Sur 3-2-1-NINJA ! tout le monde saute dans une pose ninja figée.","Chaque joueur fait UNE frappe vers la main d'un voisin.","La cible peut esquiver avec UN mouvement. Si touchée, la main va dans le dos.","Deux mains perdues = éliminé. Le dernier ninja gagne !"],facilTip:"Modélisez avec un maximum de sérieux pour un maximum de rires.",facilScript:"En cercle. Sur 3-2-1, pose ninja. UNE frappe vers la main d'un voisin. Esquive avec UN mouvement. Deux mains perdues = éliminé. 3... 2... 1... NINJA !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:20,name:"Ho Ha He (Le Bûcheron)",type:"Energizer",minPeople:8,maxPeople:40,duration:8,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Un jeu en cercle de mimes précis et sons synchronisés — HO, HA, HE — de plus en plus rapide et chaotique.",instructions:["En cercle. Une personne crie HO ! en mimant une hache de haut en bas vers quelqu'un en face.","La personne ciblée crie HA ! en levant les deux mains vers le haut.","Les deux voisins crient HE ! et miment une coupe de chaque côté.","La personne ciblée devient le nouvel envoyeur. Accélérez.","Élimination optionnelle : quiconque hésite ou se trompe est éliminé."],facilTip:"Enseignez lentement d'abord — HO-HA-HE doit être compris avant d'accélérer.",facilScript:"HO ! [hache vers quelqu'un]. Cette personne : HA ! [mains vers le haut]. Ses voisins : HE ! [coupe de chaque côté]. Doucement d'abord... bien ! Plus vite. Plus fort. GO !",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},

  {id:13,name:"Se Lever Dos à Dos",type:"Energizer",minPeople:4,maxPeople:30,duration:5,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Des paires essaient de se lever ensemble dos à dos — puis élargissent progressivement aux groupes.",instructions:["Trouvez un partenaire. Dos à dos, genoux pliés, bras liés.","Levez-vous ensemble SANS utiliser vos mains.","Une fois réussi, rejoignez une autre paire (groupe de 4) et réessayez.","Continuez jusqu'au groupe entier.","Débrief : qu'est-ce qui a changé ?"],facilTip:"Belle métaphore de l'interdépendance. Vérifiez les limitations de mobilité.",facilScript:"Dos à dos sur le sol, liez les bras, genoux pliés. Levez-vous ensemble — sans mains. Rejoignez une autre paire. Continuez à grandir !",materials:"Aucun (espace au sol nécessaire)",outcome:"Les participants se sentiront physiquement activés, mentalement présents et prêts à s'engager pleinement."},
  {id:29,name:"La Balade en Forêt",type:"Energizer",minPeople:4,maxPeople:200,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["seated","limited","open"],description:"Le facilitateur raconte une promenade en forêt — puis lance des obstacles surprises (un ours, une branche, des racines, des moustiques) qui déclenchent des réactions physiques incontrôlables. Chaos, fous rires et présence totale garantis.",instructions:["Demandez à tout le monde de se lever. Dites-leur de fermer les yeux et d'imaginer qu'ils se promènent dans une belle forêt. Commencez à marcher sur place — jambes en mouvement, corps stable.","Narrez calmement : oiseaux qui chantent, soleil entre les arbres, sol doux sous les pieds.","Lancez une surprise : Oh non — UN OURS ! COUREZ ! Tout le monde court sur place frénétiquement.","Retour au calme : C'est bon, on a semé l'ours. Marchez normalement. Paisible à nouveau...","Ajoutez des obstacles : branche (baisser la tête), racines (sauter), flaque (grand saut), moustiques (se battre contre eux dans tous les sens).","Variez le rythme entre calme paisible et chaos soudain. Terminez sur une belle clairière — grande inspiration, bravo tout le monde."],facilTip:"La magie vient de votre voix de conteur. Créez le suspense avant chaque surprise, puis réagissez vous-même à fond — le groupe copie votre énergie. Le contraste entre la marche paisible et le chaos soudain, c'est ce qui provoque les éclats de rire.",facilScript:"Tout le monde debout. Fermez les yeux. Nous nous promenons dans une belle forêt... sentez le sol sous vos pieds... commencez à marcher... des oiseaux chantent... c'est paisible... attendez... vous entendez ça ?... OH NON — UN OURS !! COUREZ COUREZ COUREZ ! [tout le monde court sur place] ...OK OK, on l'a semé, ralentissez... marchez normalement... on l'a échappé belle... ATTENTION — une branche ! [baisser la tête !] ...ouf... on continue... DES RACINES PARTOUT ! [sautez sautez sautez] ...presque là... oh non DES MOUSTIQUES ! [se battre dans tous les sens] ...disparus... et nous voilà dans une belle clairière. Grande inspiration. Bravo tout le monde.",materials:"Aucun",outcome:"Les participants se sentiront physiquement activés, totalement présents et unis par le rire — un parfait regain d'énergie à n'importe quel moment de la session."},
  {id:21,name:"Tour de Présentation",type:"Icebreaker",minPeople:3,maxPeople:20,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Le classique tour de présentations — enrichi d'une question ciblée. Fonctionne dans n'importe quel contexte.",instructions:["Demandez à chacun de se présenter : nom, d'où il vient, ce qu'il fait.","Ajoutez une ou deux questions ciblées — personnelles, prospectives ou réflexives.","Faites le tour. Pour 15+, fixez une limite de temps (60 secondes).","Invitez le groupe à noter les points communs ou surprises."],facilTip:"La qualité de la question fait toute la différence.",facilScript:"Prenons quelques minutes pour nous rencontrer. Votre nom, d'où vous venez — et [votre question]. Environ une minute. Je commence...",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:2,name:"Bingo Humain",type:"Icebreaker",minPeople:10,maxPeople:50,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["limited","open"],description:"Les participants circulent pour trouver des personnes correspondant aux descriptions sur leur carte bingo.",instructions:["Distribuez des cartes bingo avec des traits personnalisés.","Lancez un minuteur. Les participants circulent et posent des questions.","Le premier à compléter une ligne crie BINGO !","Débrief : partagez la chose la plus surprenante découverte."],facilTip:"Personnalisez les traits selon votre contexte.",facilScript:"Vous avez une carte bingo. Trouvez quelqu'un qui correspond à chaque description. Un nom par case ! Premier à compléter une ligne : BINGO. 10 minutes — go !",materials:"Cartes bingo imprimées, stylos",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:3,name:"4 Coins",type:"Icebreaker",minPeople:10,maxPeople:100,duration:10,objective:["get-to-know","energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["open"],description:"Les participants se déplacent vers les coins selon leurs préférences — fait émerger similarités et différences de façon ludique.",instructions:["Étiquetez 4 coins (ex. Lève-tôt / Couche-tard / Selon les jours / Les deux).","Posez une question et tout le monde marche vers son coin.","Les gens discutent brièvement (1 min).","Répétez 4-6 fois, questions légères et liées au travail."],facilTip:"Mélangez des questions ludiques avec des questions significatives.",facilScript:"Quatre coins, chacun avec une option. Allez dans le coin qui vous représente le mieux. Pas de bonne ou mauvaise réponse. Première question...",materials:"4 étiquettes de coins",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et arriveront énergisés."},
  {id:22,name:"La Ligne de Vie",type:"Icebreaker",minPeople:4,maxPeople:30,duration:20,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"En paires ou trios, les participants partagent l'histoire de leur vie — de la naissance à aujourd'hui.",instructions:["En paires ou groupes de 3. Chaque personne partage son parcours de vie — moments clés, tournants, hauts et bas.","Optionnel : le narrateur et l'auditeur dessinent simultanément la ligne de vie.","Donnez 5-8 minutes par personne. L'auditeur écoute surtout.","Invitez quelques volontaires à partager une découverte sur leur partenaire."],facilTip:"La vulnérabilité est contagieuse. Si vous modélisez une vraie ouverture, la salle suivra.",facilScript:"En paires, partagez votre vie — de la naissance à aujourd'hui. Juste ce qui est important. Environ 7 minutes chacun. Votre partenaire écoute pleinement. Trouvez votre partenaire.",materials:"Papier et stylos (optionnel)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:5,name:"L'Île Déserte",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Naufragé sur une île déserte pendant un mois — quels 3 objets emportez-vous ? Un classique qui révèle la personnalité.",instructions:["Naufragé sur une île déserte pendant un mois — 3 objets seulement. Que choisissez-vous ?","2 minutes de réflexion individuelle.","Faites le tour — chaque personne partage ses 3 objets et pourquoi.","Débrief : patterns — pratiques vs créatifs vs émotionnels."],facilTip:"Contrainte : un objet utile au groupe, un personnel, un surprenant.",facilScript:"Naufragé sur une île déserte pendant un mois. Exactement 3 objets. 2 minutes pour décider. Puis nous partageons.",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:4,name:"Mon Superpouvoir",type:"Icebreaker",minPeople:5,maxPeople:25,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Chaque personne identifie et partage une force unique — son superpouvoir d'équipe.",instructions:["Si vous deviez nommer un superpouvoir unique que vous apportez à une équipe, lequel serait-ce ?","1 minute pour réfléchir.","Faites le tour — chaque personne partage en une phrase.","Optionnel : vote pour le combo d'équipe le plus puissant."],facilTip:"Cadrez-le légèrement — certaines personnes sont gênées de se mettre en avant.",facilScript:"Si vous aviez un superpouvoir — une force unique que vous apportez à une équipe — lequel ? 1 minute. Sérieux ou drôle. Nous partageons en une phrase.",materials:"Aucun (post-its optionnels)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:23,name:"Partage d'Objet",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Chaque personne apporte un objet significatif et partage l'histoire derrière.",instructions:["Demandez aux participants d'apporter un objet significatif.","Faites le tour — montrez l'objet et expliquez (30-60 secondes).","Invitez une ou deux réactions.","Débrief optionnel : quels thèmes ont émergé ?"],facilTip:"Envoyez la consigne 24h avant. Partagez le vôtre en premier pour donner le ton.",facilScript:"Montrez votre objet, dites-nous ce que c'est et pourquoi vous l'avez apporté. Environ 45 secondes chacun.",materials:"Les participants apportent leur propre objet (consigne pré-atelier requise)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:24,name:"Association de Mots",type:"Icebreaker",minPeople:2,maxPeople:5,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Tout le monde dit un mot que fait penser une personne — puis cette personne répond avec des histoires.",instructions:["Concentrez-vous sur une personne. Tous les autres disent un mot instinctivement.","La personne partage une histoire ou réflexion liée à chaque mot.","Tournez jusqu'à ce que tout le monde soit passé.","Version étendue (30 min) : plus de mots et narration approfondie."],facilTip:"Les mots révèlent autant sur les locuteurs que sur la personne au centre.",facilScript:"Une personne sur le siège chaud — tous donnent un mot instinctif. Puis la personne répond à chaque mot avec une histoire. Je commence sur le siège chaud.",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:25,name:"Questions Puissantes",type:"Icebreaker",minPeople:6,maxPeople:100,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["limited","open"],description:"Chaque personne formule une question puissante, puis circule pour poser et répondre avec différents partenaires.",instructions:["Expliquez ce qui rend une question puissante. Bon et mauvais exemple.","2 minutes pour écrire sa question.","Tout le monde lève la main. Trouvez un partenaire, posez-vous vos questions, écoutez.","Main levée et nouveau partenaire. Répétez 3-5 rounds.","Débrief : quelle était la question la plus puissante ?"],facilTip:"Mauvais : Que faites-vous ? Bon : Quelle conviction avez-vous avec laquelle la plupart désaccorderaient ?",facilScript:"Écrivez une question puissante. 2 minutes. Levez la main. Trouvez quelqu'un. Posez-vous vos questions et écoutez. Quand fini, main levée. Go !",materials:"Post-its et stylos (optionnel)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:26,name:"La Ligne Silencieuse",type:"Icebreaker",minPeople:8,maxPeople:200,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["limited","open"],description:"Les participants prennent silencieusement position sur un spectre entre deux extrêmes — puis expliquent leur choix.",instructions:["Tracez une ligne imaginaire : un bout = Tout à fait d'accord, l'autre = Pas du tout.","Lisez une affirmation. Tout le monde se place silencieusement.","Invitez quelques personnes à expliquer leur choix.","Répétez 4-6 fois."],facilTip:"Le silence prévient la pensée de groupe.",facilScript:"Une ligne — Tout à fait d'accord ici, Pas du tout là. Trouvez votre position silencieusement. Première affirmation...",materials:"Aucun (ruban adhésif optionnel)",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:27,name:"Les Mains Silencieuses",type:"Icebreaker",minPeople:6,maxPeople:30,duration:8,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:false,space:["seated","limited","open"],description:"L'exercice de spectre avec la hauteur de la main. Pour les grandes salles assises, préférez La Ligne Silencieuse.",instructions:["Main complètement levée = Tout à fait d'accord, baissée = Pas du tout d'accord.","Lisez une affirmation. Tout le monde place sa main silencieusement.","Invitez quelques personnes à expliquer.","Répétez 4-6 fois."],facilTip:"En restaurant ou contexte formel, c'est la façon la plus élégante d'animer un spectre.",facilScript:"Spectre rapide avec vos mains. Complètement levée = tout à fait d'accord. Baissée = pas du tout. Entre les deux, position honnête. Silencieusement. Prêts ?",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
  {id:28,name:"Adjectif + Prénom",type:"Icebreaker",minPeople:5,maxPeople:15,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["seated","limited","open"],description:"Chaque personne associe son prénom à un adjectif allitératif et un mime — le groupe mémorise, puis un jeu de vitesse commence.",instructions:["Choisissez un adjectif commençant par la même lettre que votre prénom et un mime.","Faites le tour — après chaque personne, tout le groupe répète tous les combos précédents.","Démarrez le jeu : dites votre combo puis celui de quelqu'un d'autre.","Accélérez. Élimination optionnelle pour hésitations."],facilTip:"Ne sautez pas le tour de mémorisation — c'est la base du jeu.",facilScript:"Un adjectif commençant par la même lettre que votre prénom — et un mime. Je commence : Amazing Anna [mime]. Tout le monde répète. Puis la personne suivante. Prêts ?",materials:"Aucun",outcome:"Les participants se sentiront plus à l'aise, découvriront quelque chose de nouveau et créeront une connexion initiale."},
];

const VI_ACTIVITIES = [
  {id:9,name:"Power 8",type:"Energizer",minPeople:15,maxPeople:200,duration:4,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"Bài tập đếm ngược để giải phóng căng thẳng và nạp lại năng lượng. Nhanh, phổ quát, phù hợp mọi quy mô nhóm.",instructions:["Đứng dậy (hoặc ngồi nếu cần).","Lắc tay phải đếm ngược từ 8: 8-7-6-5-4-3-2-1!","Lặp lại với tay trái, chân phải, chân trái — mỗi bên 8 nhịp.","Lặp lại cả chuỗi từ 4, rồi 2, rồi 1.","Kết thúc bằng một cú nhảy, vỗ tay hoặc hô to!"],facilTip:"Hoạt động rất tốt trực tuyến — mọi người làm tại chỗ ngồi. Không ngại ngùng, năng lượng tức thì.",facilScript:"Đứng dậy — hoặc ngồi nếu cần. Tay phải, lắc 8 lần: 8, 7, 6, 5, 4, 3, 2, 1! Tay trái! Chân phải! Chân trái! Từ 4... từ 2... từ 1! [Kết thúc ăn mừng!]",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:17,name:"Oẳn Tù Tì Khổng Lồ",type:"Energizer",minPeople:15,maxPeople:200,duration:10,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Giải đấu oẳn tù tì toàn phòng — người thua trở thành cổ động viên nhiệt tình, dẫn đến trận chung kết hoành tráng.",instructions:["Mọi người giơ tay phải để báo hiệu sẵn sàng. Tìm người khác cũng giơ tay và chơi oẳn tù tì.","Người thua ngay lập tức trở thành cổ động viên của người thắng — đi theo, hô tên họ.","Người thắng giữ tay giơ cao và tìm đối thủ mới. Đội cổ động viên ngày càng lớn hơn.","Khi chỉ còn 2 người, dừng lại. Phỏng vấn họ, tạo không khí hồi hộp.","Đếm ngược đến trận chung kết: 3 hoặc 5 ván!"],facilTip:"Năng lượng của bạn quyết định tất cả. Hãy vào vai bình luận viên thể thao trong trận chung kết!",facilScript:"Mọi người giơ tay phải — bạn đã vào! Tìm người khác giơ tay và chơi. Người thắng giữ tay. Người thua? FAN SỐ 1! Đi theo họ. Hô tên họ. Hai người cuối vào chung kết. GO!",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:18,name:"Gỡ Nút Thắt",type:"Energizer",minPeople:6,maxPeople:200,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Mọi người nắm tay ngẫu nhiên trong vòng tròn, tạo thành nút thắt người mà nhóm phải gỡ mà không được thả tay.",instructions:["Đứng thành vòng tròn khép chặt cho đến khi vai gần chạm nhau.","Mọi người giơ tay phải và nắm tay ai đó ở phía đối diện — không phải người bên cạnh.","Giơ tay trái và nắm tay người khác — cũng không phải người bên cạnh.","Không thả tay, hãy gỡ nút thắt bằng cách bước qua, chui qua và xoay người.","Nếu bị kẹt, cho phép một lần nghỉ khẩn cấp. Hai vòng tròn liên kết cũng tính là thắng!","Với 20+ người: chia thành nhiều nhóm và thi — nhóm nào gỡ xong trước thắng!"],facilTip:"Tiềm năng thảo luận phong phú về động lực nhóm. Hiệu quả nhất khi mọi người thử nghiệm cùng nhau.",facilScript:"Vòng tròn khép chặt. Giơ tay phải, nắm tay ai đó phía đối diện — không phải người bên cạnh! Giơ tay trái, nắm người khác. Không thả tay, hãy gỡ nút thắt. Bắt đầu!",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:19,name:"Đi Vòng Quanh Phòng",type:"Energizer",minPeople:8,maxPeople:100,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Trò chơi vận động đơn giản — người dẫn gọi số kèm hành động, rồi bất ngờ gọi sai để tạo hỗn loạn vui nhộn.",instructions:["Mọi người đi vòng quanh phòng. Người dẫn gọi các số kèm hành động.","Số 1 = đập tay người gần nhất. Luyện tập vài lần.","Số 2 = mọi người nhảy lên. Nhưng ngay sau khi thông báo 2, gọi ngay số 1 — một số người sẽ nhảy theo phản xạ!","Thêm: 3 = ngồi xuống nhanh, 4 = tạo nhóm đúng 4 người.","Người dẫn có thể bịa thêm số mới. Giữ nhịp độ nhanh và bất ngờ."],facilTip:"Trò lừa chỉ hiệu quả nếu bạn giữ mặt thẳng hoàn toàn.",facilScript:"Đi vòng quanh phòng. 1 = đập tay người gần nhất. Thử nào: MỘT! [lặp lại]. Giờ, 2 = nhảy lên. MỘT! [dừng] MỘT! [hỗn loạn vui]. HAI! Ha!",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:10,name:"Zip Zap Zop",type:"Energizer",minPeople:8,maxPeople:40,duration:5,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Trò chơi chú ý nhanh — năng lượng truyền quanh vòng tròn qua từ ngữ và giao tiếp mắt.",instructions:["Đứng thành vòng tròn. Một người chỉ vào ai đó và nói Zip!","Người đó chỉ vào người khác và nói Zap!","Người đó chỉ vào người khác và nói Zop!","Tiếp tục: Zip, Zap, Zop... Tăng tốc dần.","Ai do dự hoặc nói sai bị loại!"],facilTip:"Biểu diễn với sự nhiệt tình thái quá. Hoàn hảo sau giờ nghỉ trưa.",facilScript:"Vòng tròn. Ba từ: Zip, Zap, Zop — theo thứ tự đó. Chỉ và nói ZIP. ZAP. ZOP. Tốc độ tăng dần. Ai do dự bị loại. Bắt đầu!",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:11,name:"Bóng Âm Thanh",type:"Energizer",minPeople:6,maxPeople:30,duration:7,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:true,space:["seated","limited","open","online"],description:"Một quả bóng tưởng tượng được ném kèm hiệu ứng âm thanh. Thêm bóng để tăng độ hỗn loạn!",instructions:["Ném quả bóng vô hình kèm âm thanh (WHOOSH!).","Người nhận bắt bóng kèm âm thanh và ném cho người khác.","Sau 1 phút, thêm quả bóng thứ 2: siêu nặng, khoai nóng, bóng nảy...","Thử thách: giữ tất cả các bóng cùng lúc!"],facilTip:"Hoạt động trực tuyến cũng được — ném bằng cử chỉ camera và âm thanh.",facilScript:"Chúng ta có một quả bóng vô hình. Nhìn vào mắt ai đó, chỉ tay, và tạo ra âm thanh. Tôi thêm quả bóng thứ hai — SIÊU NẶNG. Sẵn sàng chưa?",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:12,name:"Gương",type:"Energizer",minPeople:6,maxPeople:40,duration:7,objective:["energy","get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:true,space:["seated","limited","open","online"],description:"Các cặp phản chiếu chuyển động chậm của nhau — không có người dẫn ở vòng cuối.",instructions:["Từng cặp. Đứng đối mặt (hoặc qua camera trực tuyến).","Một người dẫn chuyển động chậm; người kia phản chiếu chính xác.","Sau 90 giây, đổi vai.","Vòng 3: không ai dẫn — cố gắng chuyển động như một người.","Thảo luận: cảm giác dẫn, theo và chia sẻ lãnh đạo như thế nào?"],facilTip:"Vòng thứ ba không có người dẫn mới là điều kỳ diệu. Nhạc nền nhẹ nhàng tăng thêm hiệu ứng.",facilScript:"Tìm một người bạn, đứng đối mặt. Một người dẫn — chuyển động chậm. Người kia phản chiếu. Sau 90 giây tôi nói đổi. Vòng cuối: không ai dẫn. Bắt đầu.",materials:"Không cần (nhạc nhẹ tùy chọn)",outcome:"Người tham gia sẽ cảm thấy được nạp năng lượng và kết nối hơn với những người xung quanh."},
  {id:14,name:"Ninja",type:"Energizer",minPeople:6,maxPeople:25,duration:10,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Trò chơi loại trừ kịch tính với tư thế đóng băng và đòn đánh đơn — năng lượng cao, cười không ngừng.",instructions:["Vòng tròn. Khi hô 3-2-1-NINJA! mọi người nhảy vào tư thế ninja và đóng băng.","Theo chiều kim đồng hồ, mỗi người thực hiện MỘT động tác đánh về phía tay người bên cạnh.","Người bị đánh có thể né với MỘT chuyển động. Nếu trúng, tay đó để sau lưng.","Mất hai tay = bị loại. Ninja cuối cùng đứng thắng!"],facilTip:"Biểu diễn với sự nghiêm túc tối đa để tạo ra tiếng cười tối đa.",facilScript:"Vòng tròn. Khi tôi đếm 3-2-1, nhảy vào tư thế ninja mạnh nhất và đóng băng. MỘT đòn đánh. Né với MỘT chuyển động. Mất hai tay = bị loại. 3... 2... 1... NINJA!",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:20,name:"Ho Ha He (Tiều Phu)",type:"Energizer",minPeople:8,maxPeople:40,duration:8,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["limited","open"],description:"Trò chơi vòng tròn với cử chỉ và âm thanh — HO, HA, HE — ngày càng nhanh hơn, to hơn và hỗn loạn hơn.",instructions:["Vòng tròn. Một người hô HO! và giả vờ chặt cây từ trên xuống hướng về ai đó.","Người bị chỉ vào hô HA! và đẩy hai tay từ dưới lên trên.","Hai người hàng xóm của họ cùng hô HE! và giả vờ chặt từ hai bên vào.","Người bị chỉ vào trở thành người gửi mới. Tăng tốc mỗi vòng.","Loại trừ tùy chọn: ai do dự hoặc làm sai bị loại."],facilTip:"Dạy chậm trước — chuỗi HO-HA-HE phải được hiểu rõ trước khi tăng tốc.",facilScript:"HO! [chặt xuống về phía ai đó]. Người đó: HA! [tay lên]. Hai người hàng xóm: HE! [chặt từ hai bên]. Chậm trước... tốt! Giờ nhanh hơn. To hơn. BẮT ĐẦU!",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:29,name:"Di Trong Rung",type:"Energizer",minPeople:4,maxPeople:200,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["seated","limited","open"],description:"Moi nguoi tuong tuong dang di dao trong rung. Nguoi dan ke chuyen va tung ra nhung bat ngo khien ca phong chay, nhay, ne va cuoi khong ngung.",instructions:["Yeu cau moi nguoi dung day. Nham mat lai, chung ta dang di dao trong mot khu rung dep. Bat dau di bo tai cho.","Nguoi dan ke chuyen va dua ra cac tinh huong tung cai mot, moi tinh huong doi hoi mot phan ung the chat.","Vi du: Oi khong mot CON GAU, chay thoi! (moi nguoi chay tai cho). On roi di binh thuong thoi. Can than mot cai canh cay! (khom nguoi xuong). Re cay o khap noi! (nhay qua). Oi khong MUOI! (dap muoi xung quanh).","Thay doi nhip do giua nhung khoanh khac binh yen va nhung bat ngo dot ngot.","Ket thuc tai mot bai co yen binh: Chung ta den roi. Hit tho sau. Dep khong?"],facilTip:"Phep mau nam o giong ke chuyen cua ban. Tao su hoi hop truoc bat ngo, roi phan ung het minh. Ban cang kich tinh va hai huoc, nhom cang huong ung.",facilScript:"Moi nguoi dung day. Nham mat lai. Chung ta dang di dao trong mot khu rung dep... cam nhan mat dat duoi chan... bat dau di bo... that binh yen... chim hot liu lo... cho da... cac ban co nghe thay gi khong... OI KHONG CON GAU CHAY THOI! [moi nguoi chay tai cho] ...on roi on roi, minh thoat roi, cham lai... di binh thuong... CAN THAN CANH CAY! [khom nguoi] ...phu... RE CAY KHAP NOI! [nhay nhay nhay] ...qua roi... Oi MUOI! [dap xung quanh] ...het roi... va day roi mot bai co dep. Hit tho sau. Gioi lam moi nguoi.",materials:"Khong can",outcome:"Nguoi tham gia se cam thay duoc kich hoat the chat, hoan toan hien dien va cung nhau cuoi, mot man khoi dong lai hoan hao cho bat ky thoi diem nao trong buoi."},
  {id:13,name:"Đứng Dậy Lưng Kề Lưng",type:"Energizer",minPeople:4,maxPeople:30,duration:5,objective:["energy"],familiarity:["acquaintances","colleagues"],energy:"high",online:false,space:["open"],description:"Các cặp thử đứng dậy cùng nhau từ tư thế ngồi lưng kề lưng — rồi mở rộng sang các nhóm lớn hơn.",instructions:["Tìm một người bạn. Ngồi lưng kề lưng, đầu gối cong, tay móc vào nhau.","Thử đứng dậy cùng nhau mà KHÔNG dùng tay.","Khi thành công, tham gia cặp khác (nhóm 4) và thử lại.","Tiếp tục thêm người cho đến khi cả nhóm thử cùng nhau.","Thảo luận: điều gì thay đổi khi nhóm lớn hơn?"],facilTip:"Ẩn dụ đẹp về sự phụ thuộc lẫn nhau. Kiểm tra hạn chế về thể chất trước.",facilScript:"Lưng kề lưng, móc tay, đầu gối cong. Đứng dậy cùng nhau — không dùng tay. Khi xong, tham gia cặp khác. Tiếp tục lớn hơn!",materials:"Không cần (cần không gian sàn trống)",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, tỉnh táo và sẵn sàng tham gia với đầy đủ năng lượng."},
  {id:29,name:"Đi Dạo Trong Rừng",type:"Energizer",minPeople:4,maxPeople:200,duration:8,objective:["energy"],familiarity:["strangers","acquaintances","colleagues"],energy:"high",online:false,space:["seated","limited","open"],description:"Người dẫn kể chuyện một chuyến đi rừng — rồi tung ra những bất ngờ (con gấu, cành cây, rễ cây, muỗi) khiến cả phòng chạy, nhảy, né và cười không ngừng.",instructions:["Yêu cầu mọi người đứng dậy. Nhắm mắt lại, tưởng tượng đang đi dạo trong một khu rừng đẹp. Bắt đầu đi bộ tại chỗ — chân di chuyển, thân người giữ nguyên.","Kể chuyện nhẹ nhàng: chim hót líu lo, nắng chiếu qua tán cây, mặt đất mềm dưới chân.","Tung ra bất ngờ: Ôi không — MỘT CON GẤU! CHẠY THÔI! Mọi người chạy tại chỗ điên cuồng.","Trở lại bình thường: Ổn rồi, mình đã để lại con gấu phía sau. Đi bình thường thôi. Yên tĩnh trở lại...","Thêm các chướng ngại vật và phản ứng — cành cây (cúi đầu), rễ cây (nhảy liên tục), vũng nước (nhảy to), muỗi (phủi điên cuồng khắp người).","Xen kẽ giữa những khoảng yên bình và sự hỗn loạn đột ngột. Kết thúc tại một bãi cỏ đẹp — hít thở sâu, làm tốt lắm mọi người."],facilTip:"Phép màu nằm ở giọng kể chuyện của bạn. Tạo sự hồi hộp trước mỗi bất ngờ, rồi phản ứng hết mình — nhóm sẽ phản chiếu năng lượng của bạn. Sự tương phản giữa đi bộ yên tĩnh và hỗn loạn đột ngột chính là điều tạo ra tiếng cười.",facilScript:"Mọi người đứng dậy. Nhắm mắt lại. Chúng ta đang đi dạo trong một khu rừng đẹp... cảm nhận mặt đất dưới chân... bắt đầu đi bộ... thật bình yên... chim hót líu lo... thư thái quá... chờ đã... các bạn có nghe thấy gì không... ÔI KHÔNG MỘT CON GẤU CHẠY THÔI! [mọi người chạy tại chỗ] ...ổn rồi ổn rồi, mình thoát rồi, chậm lại... đi bình thường... thoát hiểm rồi... CẨNTHẬN CÓ CÀNH CÂY! [cúi đầu!] ...phù... tiếp tục đi... RỄ CÂY KHẮP NƠI! [nhảy nhảy nhảy] ...qua rồi... ôi không MUỖI! [phủi khắp người] ...hết rồi... và đây rồi một bãi cỏ đẹp. Hít thở sâu. Giỏi lắm mọi người.",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy được kích hoạt thể chất, hoàn toàn hiện diện và cùng nhau cười — một màn khởi động lại hoàn hảo cho bất kỳ thời điểm nào trong buổi."},
  {id:21,name:"Vòng Giới Thiệu",type:"Icebreaker",minPeople:3,maxPeople:20,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Vòng giới thiệu cổ điển — được nâng cấp với một câu hỏi sâu sắc. Phù hợp mọi bối cảnh.",instructions:["Mọi người tự giới thiệu: tên, đến từ đâu, làm gì.","Thêm một hoặc hai câu hỏi phù hợp — cá nhân, hướng tới tương lai hoặc sâu sắc.","Lần lượt từng người. Với 15+ người, giới hạn thời gian mỗi người (60 giây).","Sau khi tất cả chia sẻ, mời nhóm nhận xét điểm chung hoặc điều thú vị."],facilTip:"Câu hỏi quyết định tất cả. Điều gì người ta không đoán được từ chức danh của bạn? sẽ tạo ra chia sẻ phong phú hơn.",facilScript:"Dành vài phút để làm quen nhau. Chia sẻ tên, đến từ đâu — và [câu hỏi của bạn]. Khoảng một phút mỗi người. Tôi bắt đầu trước.",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy thoải mái hơn, khám phá điều mới về nhau và tạo kết nối ban đầu."},
  {id:2,name:"Bingo Con Người",type:"Icebreaker",minPeople:10,maxPeople:50,duration:15,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["limited","open"],description:"Người tham gia di chuyển để tìm người phù hợp với mô tả trên thẻ bingo.",instructions:["Phát thẻ bingo với các đặc điểm như nói 3 ngôn ngữ hoặc đã sống ở 3 quốc gia.","Bấm giờ. Mọi người di chuyển và đặt câu hỏi để điền vào thẻ.","Người đầu tiên hoàn thành một hàng hô BINGO!","Thảo luận: chia sẻ điều thú vị nhất bạn khám phá."],facilTip:"Tùy chỉnh đặc điểm theo bối cảnh nhóm của bạn.",facilScript:"Bạn có một thẻ bingo. Tìm người phù hợp với mỗi mô tả và viết tên họ vào ô. Mỗi người chỉ dùng một lần! Người đầu tiên hoàn thành một hàng hô BINGO. Bạn có 10 phút — bắt đầu!",materials:"Thẻ bingo in sẵn, bút",outcome:"Người tham gia sẽ cảm thấy thoải mái hơn, khám phá điều mới về nhau và tạo kết nối ban đầu."},

  {id:22,name:"Đường Đời",type:"Icebreaker",minPeople:4,maxPeople:30,duration:20,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Theo từng cặp hoặc bộ ba, người tham gia chia sẻ câu chuyện cuộc đời từ khi sinh ra đến hôm nay.",instructions:["Thành cặp hoặc nhóm 3. Mỗi người chia sẻ hành trình cuộc đời — những khoảnh khắc quan trọng, bước ngoặt, vui buồn.","Tùy chọn: cả người kể và người nghe đều vẽ đường đời trên giấy đồng thời.","Mỗi người 5-8 phút. Người nghe chủ yếu lắng nghe.","Nếu còn thời gian, mời vài người chia sẻ điều họ khám phá về người bạn."],facilTip:"Sự chân thật là lây lan. Nếu bạn mở đầu bằng sự cởi mở thực sự, cả phòng sẽ theo.",facilScript:"Theo cặp, hãy chia sẻ cuộc đời bạn — từ khi sinh ra đến hôm nay. Không phải tất cả, chỉ những gì quan trọng. Khoảng 7 phút mỗi người. Người kia lắng nghe hoàn toàn. Tìm người bạn của bạn.",materials:"Giấy và bút (tùy chọn)",outcome:"Người tham gia sẽ cảm thấy thoải mái hơn, khám phá điều mới về nhau và tạo kết nối ban đầu."},
  {id:5,name:"Đảo Hoang",type:"Icebreaker",minPeople:4,maxPeople:20,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"low",online:true,space:["seated","limited","open","online"],description:"Bị mắc kẹt trên đảo hoang một tháng — bạn mang theo 3 vật gì? Trò chơi cổ điển tiết lộ tính cách.",instructions:["Bạn bị mắc kẹt trên đảo hoang một tháng — chỉ 3 vật. Bạn chọn gì?","Cho 2 phút suy nghĩ cá nhân.","Lần lượt từng người chia sẻ 3 vật và lý do.","Thảo luận: nhận xét xu hướng — thực tế vs sáng tạo vs cảm xúc."],facilTip:"Thêm thử thách: một vật hữu ích cho nhóm, một vật cá nhân, một vật bất ngờ.",facilScript:"Hình dung này: bạn mắc kẹt trên đảo hoang một tháng. Đúng 3 vật. 2 phút để quyết định. Rồi chúng ta chia sẻ.",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy thoải mái hơn, khám phá điều mới về nhau và tạo kết nối ban đầu."},

  {id:26,name:"Đường Thẳng Im Lặng",type:"Icebreaker",minPeople:8,maxPeople:200,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"medium",online:false,space:["limited","open"],description:"Người tham gia im lặng đứng vào vị trí trên một trục giữa hai cực — rồi giải thích lựa chọn của mình.",instructions:["Vẽ đường tưởng tượng: một đầu = Hoàn toàn đồng ý, đầu kia = Hoàn toàn không đồng ý.","Đọc một nhận định. Mọi người im lặng tìm vị trí của mình.","Mời vài người ở các vị trí khác nhau giải thích.","Lặp lại 4-6 lần, xen kẽ câu nhẹ và câu liên quan đến chủ đề."],facilTip:"Sự im lặng trước khi chia sẻ là chìa khóa — nó ngăn tư duy đám đông.",facilScript:"Tưởng tượng một đường thẳng — Hoàn toàn đồng ý bên này, Hoàn toàn không đồng ý bên kia. Tìm vị trí của bạn im lặng. Nhận định đầu tiên...",materials:"Không cần (băng dính tùy chọn)",outcome:"Người tham gia sẽ cảm thấy thoải mái hơn, khám phá điều mới về nhau và tạo kết nối ban đầu."},
  {id:27,name:"Bàn Tay Im Lặng",type:"Icebreaker",minPeople:6,maxPeople:30,duration:8,objective:["get-to-know"],familiarity:["strangers","acquaintances","colleagues"],energy:"low",online:false,space:["seated","limited","open"],description:"Bài tập trục thích nghi với mọi bối cảnh — người tham gia phản hồi bằng chiều cao bàn tay. Với hội trường lớn, dùng Đường Thẳng Im Lặng.",instructions:["Giải thích thang đo: tay giơ hoàn toàn = Hoàn toàn đồng ý, tay hạ hoàn toàn = Hoàn toàn không đồng ý.","Đọc nhận định. Mọi người im lặng đặt tay ở vị trí của mình.","Mời vài người giải thích.","Lặp lại 4-6 lần."],facilTip:"Trong nhà hàng hoặc bối cảnh trang trọng, đây là cách thanh lịch nhất để thực hiện bài trục.",facilScript:"Trục nhanh — với bàn tay. Giơ hoàn toàn = hoàn toàn đồng ý. Hạ hoàn toàn = hoàn toàn không đồng ý. Ở giữa là vị trí thật của bạn. Im lặng. Sẵn sàng chưa?",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy thoải mái hơn, khám phá điều mới về nhau và tạo kết nối ban đầu."},
  {id:28,name:"Tính Từ + Tên",type:"Icebreaker",minPeople:5,maxPeople:15,duration:10,objective:["get-to-know"],familiarity:["strangers","acquaintances"],energy:"medium",online:false,space:["seated","limited","open"],description:"Mỗi người ghép tên với một tính từ cùng chữ cái và một cử chỉ — nhóm ghi nhớ tất cả, rồi trò chơi truyền nhanh bắt đầu.",instructions:["Mỗi người chọn tính từ bắt đầu bằng cùng chữ cái với tên, thêm cử chỉ và tự giới thiệu.","Lần lượt — sau mỗi người, cả nhóm lặp lại tất cả combo trước khi thêm người mới.","Khi tất cả đã giới thiệu, bắt đầu trò chơi: nói combo của bạn rồi ngay lập tức nói combo người khác.","Tăng tốc dần. Loại trừ tùy chọn khi do dự hoặc sai."],facilTip:"Đừng bỏ qua vòng ghi nhớ — đó là nền tảng làm trò chơi hoạt động.",facilScript:"Nghĩ về một tính từ bắt đầu bằng cùng chữ cái với tên bạn — và một cử chỉ. Tôi đi trước: Amazing Anna [cử chỉ]. Mọi người lặp lại. Rồi người tiếp theo. Sẵn sàng chưa?",materials:"Không cần",outcome:"Người tham gia sẽ cảm thấy thoải mái hơn, khám phá điều mới về nhau và tạo kết nối ban đầu."},
